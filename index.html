<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clover's Great Escape!</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      padding: 12px 12px 28px;
      overflow-y: auto;
    }

    h1 {
      margin: 6px 0 8px;
      text-align: center;
    }

    p {
      margin-top: 0;
      opacity: 0.85;
      text-align: center;
      max-width: 560px;
      padding: 0 12px;
      line-height: 1.4;
    }

    .game-wrap {
      position: relative;
      width: min(100%, 400px);
      aspect-ratio: 2 / 3;
      border: 2px solid white;
      background-image: url("road.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
      border-radius: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      background: transparent;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.45);
      z-index: 20;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-box {
      width: min(100%, 320px);
      background: rgba(23, 20, 18, 0.94);
      color: #f6f0e8;
      border: 1px solid rgba(255, 240, 220, 0.18);
      border-radius: 18px;
      padding: 18px 18px 16px;
      box-shadow:
        0 16px 40px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      text-align: center;
      backdrop-filter: blur(5px);
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .overlay-text {
      font-size: 17px;
      line-height: 1.45;
      white-space: pre-line;
      min-height: 78px;
    }

    .dialogue-cursor {
      display: inline-block;
      width: 0.6ch;
      animation: blinkCursor 0.9s steps(1) infinite;
      opacity: 0.8;
    }

    @keyframes blinkCursor {
      50% {
        opacity: 0;
      }
    }

    .overlay-continue {
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .overlay-continue.hidden {
      visibility: hidden;
    }

    .overlay-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .overlay-btn {
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      border: none;
      border-radius: 999px;
      min-width: 110px;
      background: linear-gradient(180deg, #f6e7d4, #dcc1a0);
      color: #2a1d14;
      font-weight: 600;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
    }

    .overlay-btn.secondary {
      background: linear-gradient(180deg, #d9d2ca, #b9aea4);
    }

    .end-banner {
      position: absolute;
      inset: 0;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(30px, 8vw, 52px);
      font-weight: 800;
      letter-spacing: 0.12em;
      color: #fff7d6;
      text-shadow:
        0 0 12px rgba(255, 230, 150, 0.55),
        0 6px 20px rgba(0, 0, 0, 0.55);
      pointer-events: none;
    }

    .end-banner.hidden {
      display: none;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.5rem;
      }

      p {
        font-size: 0.95rem;
      }

      .overlay-text {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <h1>Clover's Great Escape!</h1>
  <p>
    Escape the butchers! Eat your veggies!
    <br>
  </p>

  <div class="game-wrap">
    <canvas id="game" width="400" height="600"></canvas>

    <div id="overlay" class="overlay">
      <div class="overlay-box">
        <div id="overlayText" class="overlay-text"></div>
        <div id="overlayContinue" class="overlay-continue hidden">tap to continue</div>
        <div id="overlayButtons" class="overlay-buttons"></div>
      </div>
    </div>

    <div id="endBanner" class="end-banner hidden">FREEDOM</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const overlay = document.getElementById("overlay");
    const overlayText = document.getElementById("overlayText");
    const overlayButtons = document.getElementById("overlayButtons");
    const overlayContinue = document.getElementById("overlayContinue");
    const endBanner = document.getElementById("endBanner");

    let gameStarted = false;
    let gameOver = false;
    let gamePaused = true;
    let gameWon = false;
    let frame = 0;
    let score = 0;
    let lives = 3;
    let awardedLifeThreshold = 0;
    let hitFlashTimer = 0;
    let bonusFlashTimer = 0;
    let bonusFlashText = "";
    let speedModeActivated = false;

    let checkpoint10000Shown = false;
    let checkpoint20000Shown = false;
    let freedomSequenceActive = false;
    let heartsCelebrationActive = false;
    let finalOverlayShown = false;
    let exitingMortality = false;
    let heartExplosionCount = 0;
    const MAX_HEART_EXPLOSIONS = 3;

    let mooPulseActive = false;
    let mooPulseTimer = 0;
    let mooCooldownTimer = 0;
    let lastTapTime = 0;
    let mooFlashTimer = 0;

    let activeDialogue = null;
    let dialogueTimeout = null;
    let overlayTapHandler = null;

    const BASE_WIDTH = 400;
    const BASE_HEIGHT = 600;

    const player = {
      x: 180,
      y: 500,
      width: 72,
      height: 72,
      speed: 11,
      invulnerableTimer: 0
    };

    let keys = {};
    let fallingObjects = [];
    let heartBursts = [];

    let touchActive = false;
    let touchTargetX = null;
    let touchTargetY = null;

    let playerFacingLeft = false;

    const playerSpriteSheet = new Image();
    playerSpriteSheet.src = "cow2-walk-v1.png";

    const PLAYER_SPRITE_COLS = 5;
    const PLAYER_SPRITE_ROWS = 5;
    const PLAYER_TOTAL_FRAMES = 25;
    const PLAYER_FRAME_DURATION = 6;
    let playerAnimationFrame = 0;

    const badImageFiles = ["falling1.png", "falling2.png", "falling3.png"];
    const badImages = badImageFiles.map(file => {
      const img = new Image();
      img.src = file;
      return img;
    });

    const butcherSpriteSheet = new Image();
    butcherSpriteSheet.src = "butcher-walk.png";

    const BUTCHER_SPRITE_COLS = 5;
    const BUTCHER_SPRITE_ROWS = 5;
    const BUTCHER_TOTAL_FRAMES = 25;
    const BUTCHER_FRAME_DURATION = 6;

    const bonus200Img = new Image();
    bonus200Img.src = "falling4.png";

    const bonus1000Img = new Image();
    bonus1000Img.src = "falling5.png";

    const music = new Audio("music.mp3");
    music.loop = true;
    music.volume = 0.5;
    music.preload = "auto";

    const hitSound = new Audio("hit.mp3");
    hitSound.volume = 0.8;
    hitSound.preload = "auto";

    const bonusSound = new Audio("bonus.mp3");
    bonusSound.volume = 1.0;
    bonusSound.preload = "auto";

    const mooSound = new Audio("moo.m4a");
    mooSound.volume = 0.9;
    mooSound.preload = "auto";

    let isMuted = false;
    let soundsUnlocked = false;

    function scaleX(value) {
      return value * (canvas.width / BASE_WIDTH);
    }

    function scaleY(value) {
      return value * (canvas.height / BASE_HEIGHT);
    }

    function resizeCanvasToDisplaySize() {
      const displayWidth = Math.round(canvas.clientWidth);
      const displayHeight = Math.round(canvas.clientHeight);

      if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
        const oldWidth = canvas.width || BASE_WIDTH;
        const oldHeight = canvas.height || BASE_HEIGHT;

        const playerXRatio = player.x / oldWidth;
        const playerYRatio = player.y / oldHeight;

        canvas.width = displayWidth;
        canvas.height = displayHeight;

        player.x = playerXRatio * canvas.width;
        player.y = playerYRatio * canvas.height;
      }
    }

    function drawSpriteFrame(img, frameIndex, cols, rows, dx, dy, dWidth, dHeight) {
      if (!img.complete || img.naturalWidth === 0) return;

      const frameWidth = img.width / cols;
      const frameHeight = img.height / rows;

      const col = frameIndex % cols;
      const row = Math.floor(frameIndex / cols);

      const sx = col * frameWidth;
      const sy = row * frameHeight;

      ctx.drawImage(
        img,
        sx, sy, frameWidth, frameHeight,
        dx, dy, dWidth, dHeight
      );
    }

    function getHitbox(obj, insetPercent = 0.18) {
      const insetX = obj.width * insetPercent;
      const insetY = obj.height * insetPercent;

      return {
        x: obj.x + insetX,
        y: obj.y + insetY,
        width: obj.width - insetX * 2,
        height: obj.height - insetY * 2
      };
    }

    function getHomingStrength() {
      const base = score >= 10000 ? 0.016 : 0.010;
      const extra = score >= 10000 ? 0.018 : 0.012;
      return base + Math.min(score / 60000, extra);
    }

    function unlockSounds() {
      if (soundsUnlocked) return;
      soundsUnlocked = true;

      const sounds = [hitSound, bonusSound, mooSound];

      sounds.forEach((sound) => {
        try {
          sound.load();
          const playAttempt = sound.play();

          if (playAttempt && typeof playAttempt.then === "function") {
            playAttempt
              .then(() => {
                sound.pause();
                sound.currentTime = 0;
              })
              .catch(() => {});
          } else {
            sound.pause();
            sound.currentTime = 0;
          }
        } catch (err) {}
      });
    }

    function activateMooPulse() {
      if (!gameStarted || gamePaused || gameOver) return;
      if (mooCooldownTimer > 0) return;
      if (freedomSequenceActive || heartsCelebrationActive) return;

      unlockSounds();

      mooPulseActive = true;
      mooPulseTimer = 120;
      mooCooldownTimer = 600;
      mooFlashTimer = 18;
      bonusFlashTimer = 40;
      bonusFlashText = "MOO!";

      playSound(mooSound);
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function renderDialogueText(text, typedLength, done = false) {
      const visible = escapeHtml(text.slice(0, typedLength)).replace(/\n/g, "<br>");
      overlayText.innerHTML = visible + (done ? "" : `<span class="dialogue-cursor">|</span>`);
    }

    function clearDialogueHandlers() {
      if (dialogueTimeout) {
        clearTimeout(dialogueTimeout);
        dialogueTimeout = null;
      }

      if (overlayTapHandler) {
        overlay.removeEventListener("click", overlayTapHandler);
        overlayTapHandler = null;
      }

      activeDialogue = null;
    }

    function finalizeDialogue() {
      if (!activeDialogue) return;

      activeDialogue.index = activeDialogue.text.length;
      renderDialogueText(activeDialogue.text, activeDialogue.index, true);

      if (activeDialogue.requireContinueBeforeButtons && activeDialogue.buttons.length > 0) {
        overlayContinue.classList.remove("hidden");

        overlayTapHandler = (e) => {
          if (e.target.closest("button")) return;
          overlay.removeEventListener("click", overlayTapHandler);
          overlayTapHandler = null;
          overlayContinue.classList.add("hidden");
          showDialogueButtons(activeDialogue.buttons);
        };

        overlay.addEventListener("click", overlayTapHandler);
      } else {
        showDialogueButtons(activeDialogue.buttons);
      }
    }

    function typeNextCharacter() {
      if (!activeDialogue) return;

      if (activeDialogue.index >= activeDialogue.text.length) {
        finalizeDialogue();
        return;
      }

      activeDialogue.index++;
      renderDialogueText(activeDialogue.text, activeDialogue.index, false);

      const currentChar = activeDialogue.text[activeDialogue.index - 1];
      let delay = activeDialogue.speed;

      if (currentChar === "." || currentChar === "?" || currentChar === "!") {
        delay += 120;
      } else if (currentChar === ",") {
        delay += 70;
      } else if (currentChar === "\n") {
        delay += 120;
      } else if (currentChar === " ") {
        delay -= 5;
      }

      dialogueTimeout = setTimeout(typeNextCharacter, Math.max(15, delay));
    }

    function showDialogueButtons(buttons = []) {
      overlayButtons.innerHTML = "";

      buttons.forEach((btn) => {
        const button = document.createElement("button");
        button.className = `overlay-btn${btn.secondary ? " secondary" : ""}`;
        button.textContent = btn.label;
        button.addEventListener("click", btn.onClick);
        overlayButtons.appendChild(button);
      });
    }

    function showOverlay(text, buttons = [], options = {}) {
      clearDialogueHandlers();

      gamePaused = true;
      overlay.classList.remove("hidden");
      overlayButtons.innerHTML = "";
      overlayContinue.classList.add("hidden");

      const speed = options.speed ?? 28;
      const requireContinueBeforeButtons = options.requireContinueBeforeButtons ?? false;

      activeDialogue = {
        text,
        buttons,
        index: 0,
        speed,
        requireContinueBeforeButtons
      };

      renderDialogueText(text, 0, false);

      overlayTapHandler = (e) => {
        if (e.target.closest("button")) return;
        if (!activeDialogue) return;

        if (activeDialogue.index < activeDialogue.text.length) {
          finalizeDialogue();
        }
      };

      overlay.addEventListener("click", overlayTapHandler);
      typeNextCharacter();
    }

    function hideOverlay() {
      clearDialogueHandlers();
      overlay.classList.add("hidden");
      overlayContinue.classList.add("hidden");

      if (!gameOver && !gameWon && !exitingMortality) {
        gamePaused = false;
      }
    }

    function showStartOverlay() {
      showOverlay(
        `Moo.\n\nMoo mooo mooo moo.\n\nUnderstood?`,
        [
          {
            label: "Moo.",
            onClick: async () => {
              unlockSounds();
              gameStarted = true;
              hideOverlay();

              if (!isMuted && !gameOver) {
                try {
                  music.currentTime = 0;
                  await music.play();
                } catch (err) {
                  console.log("Music could not start yet:", err);
                }
              }
            }
          }
        ],
        {
          speed: 34,
          requireContinueBeforeButtons: true
        }
      );
    }

    function showCheckpoint10000() {
      if (checkpoint10000Shown) return;
      checkpoint10000Shown = true;

      showOverlay(
        `The people want grass fed beef, and your stomachs are full of grass.\n\n Do you go on ?`,
        [
          {
            label: "Mooooo",
            onClick: () => {
              hideOverlay();
            }
          },
          {
            label: "Noooo",
            secondary: true,
            onClick: () => {
              gameOver = true;
              gamePaused = true;
              music.pause();

              showOverlay(
                `Clover lowers her head.\n\nShe will not go on.`,
                [
                  {
                    label: "Again",
                    onClick: () => {
                      restartGame();
                    }
                  }
                ],
                {
                  speed: 28,
                  requireContinueBeforeButtons: true
                }
              );
            }
          }
        ],
        {
          speed: 28,
          requireContinueBeforeButtons: true
        }
      );
    }

    function showCheckpoint20000() {
      if (checkpoint20000Shown) return;
      checkpoint20000Shown = true;
      gameWon = true;
      gamePaused = true;
      music.pause();

      showOverlay(
        `Whew.\n\nThat was close.\n\nWould you like to be milked?`,
        [
          {
            label: "Mooooo",
            onClick: () => {
              startWarmAndFuzzyEnding();
            }
          },
          {
            label: "Noooooo",
            secondary: true,
            onClick: () => {
              startFreedomEnding();
            }
          }
        ],
        {
          speed: 30,
          requireContinueBeforeButtons: true
        }
      );
    }

    function startFreedomEnding() {
      hideOverlay();
      freedomSequenceActive = true;
      gamePaused = false;
      playerFacingLeft = false;
      endBanner.classList.add("hidden");
    }

    function startWarmAndFuzzyEnding() {
      heartsCelebrationActive = true;
      finalOverlayShown = false;
      heartExplosionCount = 0;
      hideOverlay();
      makeHeartsExplode();
      heartExplosionCount++;
    }

    function makeHeartsExplode() {
      heartBursts = [];

      for (let i = 0; i < 44; i++) {
        heartBursts.push({
          x: player.x + player.width / 2,
          y: player.y + player.height / 2,
          vx: (Math.random() - 0.5) * scaleX(5.5),
          vy: (Math.random() - 0.5) * scaleY(5.5) - scaleY(1.5),
          size: Math.random() * scaleX(14) + scaleX(14),
          life: Math.random() * 80 + 90
        });
      }
    }

    function showFinalWarmOverlay() {
      if (finalOverlayShown) return;
      finalOverlayShown = true;
      gamePaused = true;

      showOverlay(
        `You feel warm and fuzzy inside.\n\nYOU ESCAPED CLOVER\n\nDo you wish to enter mortality?`,
        [
          {
            label: "Mooooo.",
            onClick: () => {
              exitToMortality();
            }
          },
          {
            label: "Noooooo.",
            secondary: true,
            onClick: () => {
              exitToMortality();
            }
          }
        ],
        {
          speed: 26,
          requireContinueBeforeButtons: true
        }
      );
    }

    function exitToMortality() {
      exitingMortality = true;
      clearDialogueHandlers();
      overlayText.innerHTML = `Entering mortality<span class="dialogue-cursor">|</span>`;
      overlayButtons.innerHTML = "";
      overlayContinue.classList.add("hidden");

      setTimeout(() => {
        window.location.reload();
      }, 900);
    }

    function restartGame() {
      resetGameState();
      gameStarted = true;
      hideOverlay();
      showStartOverlay();
    }

    function playSound(sound) {
      if (isMuted) return;

      try {
        const s = sound.cloneNode();
        s.volume = sound.volume;
        s.play().catch(() => {});
      } catch (err) {
        try {
          sound.currentTime = 0;
          sound.play().catch(() => {});
        } catch (err2) {}
      }
    }

    window.addEventListener("resize", resizeCanvasToDisplaySize);

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        if (!keys[e.code]) {
          activateMooPulse();
        }
      }

      keys[e.key] = true;
      keys[e.code] = true;
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key] = false;
      keys[e.code] = false;
    });

    function getTouchPosition(e) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];

      return {
        x: touch.clientX - rect.left,
        y: touch.clientY - rect.top
      };
    }

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      unlockSounds();

      const now = Date.now();
      if (now - lastTapTime < 300) {
        activateMooPulse();
      }
      lastTapTime = now;

      if (!gameStarted || gamePaused || gameOver) return;

      const pos = getTouchPosition(e);
      touchActive = true;
      touchTargetX = pos.x - player.width / 2;
      touchTargetY = pos.y - player.height / 2;
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      if (!gameStarted || gamePaused || gameOver) return;
      e.preventDefault();

      const pos = getTouchPosition(e);
      touchTargetX = pos.x - player.width / 2;
      touchTargetY = pos.y - player.height / 2;
    }, { passive: false });

    canvas.addEventListener("touchend", (e) => {
      if (!gameStarted) return;
      e.preventDefault();

      touchActive = false;
      touchTargetX = null;
      touchTargetY = null;
    }, { passive: false });

    function resetGameState() {
      resizeCanvasToDisplaySize();

      player.width = scaleX(72 * 1.5);
      player.height = scaleY(72 * 1.5);
      player.speed = Math.max(scaleX(11), 4);
      player.x = scaleX(164);
      player.y = canvas.height - player.height - scaleY(28);
      player.invulnerableTimer = 0;
      playerAnimationFrame = 0;
      playerFacingLeft = false;

      fallingObjects = [];
      heartBursts = [];
      gameOver = false;
      gamePaused = true;
      gameWon = false;
      frame = 0;
      score = 0;
      lives = 3;
      awardedLifeThreshold = 0;
      hitFlashTimer = 0;
      bonusFlashTimer = 0;
      bonusFlashText = "";
      speedModeActivated = false;

      checkpoint10000Shown = false;
      checkpoint20000Shown = false;
      freedomSequenceActive = false;
      heartsCelebrationActive = false;
      finalOverlayShown = false;
      exitingMortality = false;
      heartExplosionCount = 0;

      mooPulseActive = false;
      mooPulseTimer = 0;
      mooCooldownTimer = 0;
      lastTapTime = 0;
      mooFlashTimer = 0;

      touchActive = false;
      touchTargetX = null;
      touchTargetY = null;

      clearDialogueHandlers();
      endBanner.classList.add("hidden");
    }

    function getSpeedMultiplier() {
      return 1;
    }

    function getBonusMultiplier() {
      return score >= 10000 ? 1.5 : 1;
    }

    function maybeShowSpeedModeBanner() {
      if (score >= 10000 && !speedModeActivated) {
        speedModeActivated = true;
        bonusFlashTimer = 70;
        bonusFlashText = "NEEDS MORE COWBELL";
      }
    }

    function maybeAwardExtraLife() {
      const currentThreshold = Math.floor(score / 2000);
      if (currentThreshold > awardedLifeThreshold) {
        const gainedLives = currentThreshold - awardedLifeThreshold;
        lives += gainedLives;
        awardedLifeThreshold = currentThreshold;
        bonusFlashTimer = 45;
        bonusFlashText = `+${gainedLives} Life${gainedLives > 1 ? "s" : ""}!`;
      }
    }

    function spawnObject() {
      const postCowbell = score >= 10000;

      let type = "bad";
      let image = badImages[Math.floor(Math.random() * badImages.length)];
      let basePoints = 0;
      let speedMultiplier = 1;
      let usesSpriteSheet = false;
      let spriteCols = 1;
      let spriteRows = 1;
      let totalFrames = 1;
      let frameDuration = 1;
      let canHome = false;

      const roll = Math.random();

      if (postCowbell) {
        if (roll < 0.60) {
          type = "butcher";
          image = butcherSpriteSheet;
          usesSpriteSheet = true;
          spriteCols = BUTCHER_SPRITE_COLS;
          spriteRows = BUTCHER_SPRITE_ROWS;
          totalFrames = BUTCHER_TOTAL_FRAMES;
          frameDuration = BUTCHER_FRAME_DURATION;
          canHome = true;
        } else if (roll < 0.80) {
          type = "bonus1000";
          image = bonus1000Img;
          basePoints = 1000;
          speedMultiplier = 1.8;
        } else if (roll < 0.95) {
          type = "bonus200";
          image = bonus200Img;
          basePoints = 200;
          speedMultiplier = 1.0;
        } else {
          type = "bad";
          image = badImages[Math.floor(Math.random() * badImages.length)];
        }
      } else {
        if (roll < 0.15) {
          type = "bonus1000";
          image = bonus1000Img;
          basePoints = 1000;
          speedMultiplier = 1.8;
        } else if (roll < 0.30) {
          type = "bonus200";
          image = bonus200Img;
          basePoints = 200;
          speedMultiplier = .9;
        } else if (roll < 0.50) {
          type = "butcher";
          image = butcherSpriteSheet;
          usesSpriteSheet = true;
          spriteCols = BUTCHER_SPRITE_COLS;
          spriteRows = BUTCHER_SPRITE_ROWS;
          totalFrames = BUTCHER_TOTAL_FRAMES;
          frameDuration = BUTCHER_FRAME_DURATION;
          canHome = true;
        }
      }

      const size =
        type === "bonus1000"
          ? scaleX(Math.random() * 20 + 35) * 1.25
          : type === "butcher"
          ? scaleX(Math.random() * 28 + 52) * 1.15
          : scaleX(Math.random() * 25 + 40) * 1.25;

      const x = Math.random() * (canvas.width - size);
      const scoreSpeedRamp = Math.min(score * 0.0007, 2.2);
      const baseSpeed = scaleY(Math.random() * 2.0 + 2 + scoreSpeedRamp);
      const speed = baseSpeed * speedMultiplier * getSpeedMultiplier();

      fallingObjects.push({
        x,
        y: -size,
        width: size,
        height: size,
        speed,
        image,
        type,
        basePoints,
        usesSpriteSheet,
        spriteCols,
        spriteRows,
        totalFrames,
        frameDuration,
        canHome,
        animationOffset: Math.floor(Math.random() * 1000)
      });
    }

    function rectsIntersect(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    function updateHearts() {
      for (let i = heartBursts.length - 1; i >= 0; i--) {
        const heart = heartBursts[i];
        heart.x += heart.vx;
        heart.y += heart.vy;
        heart.vy += scaleY(0.04);
        heart.life--;

        if (heart.life <= 0) {
          heartBursts.splice(i, 1);
        }
      }

      if (heartsCelebrationActive && heartBursts.length === 0) {
        if (heartExplosionCount < MAX_HEART_EXPLOSIONS) {
          makeHeartsExplode();
          heartExplosionCount++;
        } else if (!finalOverlayShown) {
          heartsCelebrationActive = false;
          showFinalWarmOverlay();
        }
      }
    }

    function update() {
      updateHearts();

      if (!gameStarted || gameOver || gamePaused) return;

      frame++;

      if (!freedomSequenceActive && !heartsCelebrationActive) {
        score++;
      }

      player.width = scaleX(72 * 1.5);
      player.height = scaleY(72 * 1.5);
      player.speed = Math.max(scaleX(11), 4);

      let isMoving = false;

      if (freedomSequenceActive) {
        player.x += scaleX(2.6);
        playerFacingLeft = false;

        if (player.x > canvas.width + player.width) {
          gamePaused = true;
          freedomSequenceActive = false;
          endBanner.classList.remove("hidden");

          showOverlay(
            `FREEDOM`,
            [
              {
                label: "Mooooo.",
                onClick: () => {
                  exitToMortality();
                }
              }
            ],
            {
              speed: 44,
              requireContinueBeforeButtons: true
            }
          );
        }
      } else {
        if (keys["ArrowLeft"] || keys["a"] || keys["A"]) {
          player.x -= player.speed;
          playerFacingLeft = true;
          isMoving = true;
        }
        if (keys["ArrowRight"] || keys["d"] || keys["D"]) {
          player.x += player.speed;
          playerFacingLeft = false;
          isMoving = true;
        }
        if (keys["ArrowUp"] || keys["w"] || keys["W"]) {
          player.y -= player.speed;
          isMoving = true;
        }
        if (keys["ArrowDown"] || keys["s"] || keys["S"]) {
          player.y += player.speed;
          isMoving = true;
        }

        if (touchActive && touchTargetX !== null && touchTargetY !== null) {
          const dx = touchTargetX - player.x;
          const dy = touchTargetY - player.y;

          if (Math.abs(dx) > player.speed) {
            player.x += Math.sign(dx) * player.speed;
            playerFacingLeft = dx < 0;
            isMoving = true;
          } else if (Math.abs(dx) > 1) {
            player.x = touchTargetX;
            playerFacingLeft = dx < 0;
            isMoving = true;
          }

          if (Math.abs(dy) > player.speed) {
            player.y += Math.sign(dy) * player.speed;
            isMoving = true;
          } else if (Math.abs(dy) > 1) {
            player.y = touchTargetY;
            isMoving = true;
          }
        }
      }

      if (isMoving || freedomSequenceActive) {
        playerAnimationFrame = Math.floor(frame / PLAYER_FRAME_DURATION) % PLAYER_TOTAL_FRAMES;
      } else {
        playerAnimationFrame = 0;
      }

      if (player.x < 0) player.x = 0;
      if (!freedomSequenceActive && player.x + player.width > canvas.width) {
        player.x = canvas.width - player.width;
      }
      if (player.y < 0) player.y = 0;
      if (player.y + player.height > canvas.height) {
        player.y = canvas.height - player.height;
      }

      if (player.invulnerableTimer > 0) {
        player.invulnerableTimer--;
      }

      if (hitFlashTimer > 0) hitFlashTimer--;
      if (bonusFlashTimer > 0) bonusFlashTimer--;
      if (mooFlashTimer > 0) mooFlashTimer--;

      if (mooPulseTimer > 0) {
        mooPulseTimer--;
      } else {
        mooPulseActive = false;
      }

      if (mooCooldownTimer > 0) {
        mooCooldownTimer--;
      }

      if (!freedomSequenceActive && !heartsCelebrationActive) {
        const baseSpawnInterval = Math.max(16, 30 - Math.floor(score / 1800));
        const spawnInterval = score >= 10000
          ? Math.max(12, Math.round(baseSpawnInterval / 1.18))
          : baseSpawnInterval;

        if (frame % spawnInterval === 0) {
          spawnObject();
        }
      }

      for (let i = fallingObjects.length - 1; i >= 0; i--) {
        const obj = fallingObjects[i];
        obj.y += obj.speed;

        if (obj.canHome && !freedomSequenceActive && !heartsCelebrationActive) {
          const playerCenterX = player.x + player.width / 2;
          const playerCenterY = player.y + player.height / 2;
          const objCenterX = obj.x + obj.width / 2;
          const objCenterY = obj.y + obj.height / 2;

          const dx = playerCenterX - objCenterX;
          const dy = playerCenterY - objCenterY;

          if (mooPulseActive) {
            const pushX = -Math.sign(dx || 1) * scaleX(2.8);
            const pushY = -Math.sign(dy || 1) * scaleY(1.6);

            obj.x += pushX;
            obj.y += pushY;
          } else {
            const homingMultiplier = score >= 10000 ? 1.18 : 1.08;
            const homing = dx * getHomingStrength() * homingMultiplier;
            const maxSideSpeed = scaleX(score >= 10000 ? 1.5 : 1.35);

            obj.x += Math.max(-maxSideSpeed, Math.min(maxSideSpeed, homing));
          }
        }

        if (obj.x < -obj.width * 0.25) obj.x = -obj.width * 0.25;
        if (obj.x + obj.width > canvas.width + obj.width * 0.25) {
          obj.x = canvas.width - obj.width * 0.75;
        }

        const playerHitbox = getHitbox(player, 0.12);
        const objectHitbox =
          obj.type === "bad" || obj.type === "butcher"
            ? getHitbox(obj, 0.10)
            : getHitbox(obj, 0.12);

        const hit = rectsIntersect(playerHitbox, objectHitbox);

        if (hit) {
          if (obj.type === "bonus200" || obj.type === "bonus1000") {
            const pointsEarned = obj.basePoints * getBonusMultiplier();
            score += pointsEarned;
            maybeShowSpeedModeBanner();
            maybeAwardExtraLife();

            bonusFlashTimer = 30;
            bonusFlashText = `+${pointsEarned}`;
            playSound(bonusSound);

            fallingObjects.splice(i, 1);
            continue;
          }

          if ((obj.type === "bad" || obj.type === "butcher") && player.invulnerableTimer <= 0) {
            lives--;
            player.invulnerableTimer = 60;
            hitFlashTimer = 20;
            fallingObjects.splice(i, 1);

            playSound(hitSound);

            if (lives <= 0) {
              gameOver = true;
              gamePaused = true;
              music.pause();

              showOverlay(
                `You became a steak.\n\nFinal Score: ${score}`,
                [
                  {
                    label: "Again",
                    onClick: () => {
                      restartGame();
                    }
                  }
                ],
                {
                  speed: 28,
                  requireContinueBeforeButtons: true
                }
              );
            }

            continue;
          }
        }

        if (obj.y > canvas.height + scaleY(100)) {
          fallingObjects.splice(i, 1);
        }
      }

      if (!freedomSequenceActive && !heartsCelebrationActive) {
        maybeShowSpeedModeBanner();
        maybeAwardExtraLife();

        if (score >= 10000) {
          showCheckpoint10000();
        }

        if (score >= 20000) {
          showCheckpoint20000();
        }
      }
    }

    function drawPlayer() {
      const blinking =
        player.invulnerableTimer > 0 &&
        Math.floor(player.invulnerableTimer / 5) % 2 === 0;

      if (blinking) return;

      if (playerSpriteSheet.complete && playerSpriteSheet.naturalWidth > 0) {
        ctx.save();

        if (playerFacingLeft) {
          ctx.translate(player.x + player.width, player.y);
          ctx.scale(-1, 1);

          drawSpriteFrame(
            playerSpriteSheet,
            playerAnimationFrame,
            PLAYER_SPRITE_COLS,
            PLAYER_SPRITE_ROWS,
            0,
            0,
            player.width,
            player.height
          );
        } else {
          drawSpriteFrame(
            playerSpriteSheet,
            playerAnimationFrame,
            PLAYER_SPRITE_COLS,
            PLAYER_SPRITE_ROWS,
            player.x,
            player.y,
            player.width,
            player.height
          );
        }

        ctx.restore();
      } else {
        ctx.fillStyle = "#4da6ff";
        ctx.fillRect(player.x, player.y, player.width, player.height);
      }
    }

    function drawMooFlash() {
      if (mooFlashTimer > 0) {
        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.10)";
        ctx.beginPath();
        ctx.arc(
          player.x + player.width / 2,
          player.y + player.height / 2,
          scaleX(90 - mooFlashTimer * 2),
          0,
          Math.PI * 2
        );
        ctx.fill();
        ctx.restore();
      }
    }

    function drawFallingObjects() {
      for (const obj of fallingObjects) {
        if (obj.usesSpriteSheet && obj.image.complete && obj.image.naturalWidth > 0) {
          const animFrame =
            Math.floor((frame + obj.animationOffset) / obj.frameDuration) % obj.totalFrames;

          drawSpriteFrame(
            obj.image,
            animFrame,
            obj.spriteCols,
            obj.spriteRows,
            obj.x,
            obj.y,
            obj.width,
            obj.height
          );
        } else if (obj.image && obj.image.complete && obj.image.naturalWidth > 0) {
          ctx.drawImage(obj.image, obj.x, obj.y, obj.width, obj.height);
        } else {
          if (obj.type === "bonus200") ctx.fillStyle = "#66ff99";
          else if (obj.type === "bonus1000") ctx.fillStyle = "#ffd700";
          else ctx.fillStyle = "#ff4d4d";

          ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
        }
      }
    }

    function drawHearts() {
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      for (const heart of heartBursts) {
        ctx.font = `${Math.max(heart.size, 12)}px Arial`;
        ctx.fillText("💖", heart.x, heart.y);
      }

      ctx.restore();
    }

    function drawHUD() {
      ctx.fillStyle = "white";
      ctx.font = `${Math.max(scaleY(20), 14)}px Arial`;
      ctx.fillText(`Score: ${score}`, scaleX(12), scaleY(30));
      ctx.fillText(`Lives: ${lives}`, scaleX(12), scaleY(58));

      const nextLifeAt = (Math.floor(score / 2000) + 1) * 2000;
      const remaining = nextLifeAt - score;
      ctx.font = `${Math.max(scaleY(16), 12)}px Arial`;
      ctx.fillText(`Next life in: ${remaining > 0 ? remaining : 0}`, scaleX(12), scaleY(82));

      const mooReady = mooCooldownTimer <= 0;
      const mooSeconds = (mooCooldownTimer / 60).toFixed(1);

      ctx.fillStyle = mooReady ? "#9cffb0" : "#ffffff";
      ctx.font = `${Math.max(scaleY(15), 11)}px Arial`;
      ctx.fillText(
        mooReady ? "Moo ready: SPACE / double tap" : `Moo cooldown: ${mooSeconds}s`,
        scaleX(12),
        scaleY(108)
      );
    }

    function drawHitFlash() {
      if (hitFlashTimer > 0) {
        ctx.fillStyle = "rgba(255, 0, 0, 0.18)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function drawBonusFlash() {
      if (bonusFlashTimer > 0 && bonusFlashText) {
        ctx.fillStyle = "white";
        ctx.font = `${Math.max(scaleY(28), 18)}px Arial`;
        ctx.textAlign = "center";
        ctx.fillText(bonusFlashText, canvas.width / 2, scaleY(140));
        ctx.textAlign = "left";
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawPlayer();
      drawMooFlash();
      drawFallingObjects();
      drawHearts();
      drawHUD();
      drawHitFlash();
      drawBonusFlash();
    }

    function loop() {
      resizeCanvasToDisplaySize();
      update();
      draw();
      requestAnimationFrame(loop);
    }

    resetGameState();
    showStartOverlay();
    loop();
  </script>
</body>
