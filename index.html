<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Falling Pictures Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      margin-top: 0;
      opacity: 0.85;
      text-align: center;
      max-width: 500px;
      padding: 0 12px;
    }

    canvas {
      border: 2px solid white;
      background: #1a1a1a;
      display: block;
    }

    .controls {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Falling Pictures</h1>
  <p>
    Move with ← → or A/D. Avoid the bad falling images.<br>
    Catch <strong>falling4.png</strong> for +200 points and
    <strong>falling5.png</strong> for +1000 points.<br>
    Every 2000 points gives you an extra life.
  </p>

  <canvas id="game" width="400" height="600"></canvas>

  <div class="controls">
    <button id="startBtn">Start Game</button>
    <button id="restartBtn">Restart</button>
    <button id="muteBtn">Mute / Unmute</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const muteBtn = document.getElementById("muteBtn");

    let gameStarted = false;
    let gameOver = false;
    let frame = 0;
    let score = 0;
    let animationId = null;
    let lives = 3;
    let awardedLifeThreshold = 0;
    let hitFlashTimer = 0;
    let bonusFlashTimer = 0;
    let bonusFlashText = "";

    const player = {
      x: 180,
      y: 520,
      width: 50,
      height: 50,
      speed: 6,
      invulnerableTimer: 0
    };

    let keys = {};
    let fallingObjects = [];

    // Images
    const playerImg = new Image();
    playerImg.src = "player.png";

    const badImageFiles = ["falling1.png", "falling2.png", "falling3.png"];
    const badImages = badImageFiles.map(file => {
      const img = new Image();
      img.src = file;
      return img;
    });

    const bonus200Img = new Image();
    bonus200Img.src = "falling4.png";

    const bonus1000Img = new Image();
    bonus1000Img.src = "falling5.png";

    // Audio
    const music = new Audio("music.mp3");
    music.loop = true;
    music.volume = 0.5;

    const hitSound = new Audio("hit.mp3");
    hitSound.volume = 0.8;

    let isMuted = false;

    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key] = false;
    });

    function resetGameState() {
      player.x = 180;
      player.invulnerableTimer = 0;
      fallingObjects = [];
      gameOver = false;
      frame = 0;
      score = 0;
      lives = 3;
      awardedLifeThreshold = 0;
      hitFlashTimer = 0;
      bonusFlashTimer = 0;
      bonusFlashText = "";
    }

    function maybeAwardExtraLife() {
      const currentThreshold = Math.floor(score / 2000);
      if (currentThreshold > awardedLifeThreshold) {
        const gainedLives = currentThreshold - awardedLifeThreshold;
        lives += gainedLives;
        awardedLifeThreshold = currentThreshold;
        bonusFlashTimer = 45;
        bonusFlashText = `+${gainedLives} Life${gainedLives > 1 ? "s" : ""}!`;
      }
    }

    function spawnObject() {
      const roll = Math.random();
      let type = "bad";
      let image = badImages[Math.floor(Math.random() * badImages.length)];
      let points = 0;
      let speedMultiplier = 1;

      // Rare fast bonus
      if (roll < 0.15) {
        type = "bonus1000";
        image = bonus1000Img;
        points = 1000;
        speedMultiplier = 2;
      }
      // Less rare regular bonus
      else if (roll < 0.3) {
        type = "bonus200";
        image = bonus200Img;
        points = 200;
      }

      const size = type === "bonus1000"
        ? Math.random() * 20 + 35
        : Math.random() * 25 + 40;

      const x = Math.random() * (canvas.width - size);
      const baseSpeed = Math.random() * 2.5 + 2 + score * 0.002;
      const speed = baseSpeed * speedMultiplier;

      fallingObjects.push({
        x,
        y: -size,
        width: size,
        height: size,
        speed,
        image,
        type,
        points
      });
    }

    function rectsIntersect(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    function update() {
      if (!gameStarted || gameOver) return;

      frame++;
      score++;

      if (keys["ArrowLeft"] || keys["a"] || keys["A"]) {
        player.x -= player.speed;
      }
      if (keys["ArrowRight"] || keys["d"] || keys["D"]) {
        player.x += player.speed;
      }

      if (player.x < 0) player.x = 0;
      if (player.x + player.width > canvas.width) {
        player.x = canvas.width - player.width;
      }

      if (player.invulnerableTimer > 0) {
        player.invulnerableTimer--;
      }

      if (hitFlashTimer > 0) hitFlashTimer--;
      if (bonusFlashTimer > 0) bonusFlashTimer--;

      if (frame % 30 === 0) {
        spawnObject();
      }

      for (let i = fallingObjects.length - 1; i >= 0; i--) {
        const obj = fallingObjects[i];
        obj.y += obj.speed;

        const hit = rectsIntersect(player, obj);

        if (hit) {
          if (obj.type === "bonus200" || obj.type === "bonus1000") {
            score += obj.points;
            maybeAwardExtraLife();

            bonusFlashTimer = 30;
            bonusFlashText = `+${obj.points}`;
            fallingObjects.splice(i, 1);
            continue;
          }

          if (obj.type === "bad" && player.invulnerableTimer <= 0) {
            lives--;
            player.invulnerableTimer = 60;
            hitFlashTimer = 20;
            fallingObjects.splice(i, 1);

            if (!isMuted) {
              hitSound.currentTime = 0;
              hitSound.play().catch(() => {});
            }

            if (lives <= 0) {
              gameOver = true;
              music.pause();
            }

            continue;
          }
        }

        if (obj.y > canvas.height + 100) {
          fallingObjects.splice(i, 1);
        }
      }

      maybeAwardExtraLife();
    }

    function drawPlayer() {
      const blinking = player.invulnerableTimer > 0 && Math.floor(player.invulnerableTimer / 5) % 2 === 0;
      if (blinking) return;

      if (playerImg.complete && playerImg.naturalWidth > 0) {
        ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
      } else {
        ctx.fillStyle = "#4da6ff";
        ctx.fillRect(player.x, player.y, player.width, player.height);
      }
    }

    function drawFallingObjects() {
      for (const obj of fallingObjects) {
        if (obj.image.complete && obj.image.naturalWidth > 0) {
          ctx.drawImage(obj.image, obj.x, obj.y, obj.width, obj.height);
        } else {
          if (obj.type === "bonus200") ctx.fillStyle = "#66ff99";
          else if (obj.type === "bonus1000") ctx.fillStyle = "#ffd700";
          else ctx.fillStyle = "#ff4d4d";

          ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
        }
      }
    }

    function drawHUD() {
      ctx.fillStyle = "white";
      ctx.font = "20px Arial";
      ctx.fillText(`Score: ${score}`, 12, 30);
      ctx.fillText(`Lives: ${lives}`, 12, 58);

      const nextLifeAt = (Math.floor(score / 2000) + 1) * 2000;
      const remaining = nextLifeAt - score;
      ctx.font = "16px Arial";
      ctx.fillText(`Next life in: ${remaining}`, 12, 82);
    }

    function drawHitFlash() {
      if (hitFlashTimer > 0) {
        ctx.fillStyle = "rgba(255, 0, 0, 0.18)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function drawBonusFlash() {
      if (bonusFlashTimer > 0 && bonusFlashText) {
        ctx.fillStyle = "white";
        ctx.font = "28px Arial";
        ctx.textAlign = "center";
        ctx.fillText(bonusFlashText, canvas.width / 2, 120);
        ctx.textAlign = "left";
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = "rgba(0,0,0,0.7)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.font = "30px Arial";
      ctx.fillText("Press Start", canvas.width / 2, canvas.height / 2 - 10);

      ctx.font = "18px Arial";
      ctx.fillText("Music begins after click", canvas.width / 2, canvas.height / 2 + 30);
      ctx.textAlign = "left";
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(0,0,0,0.7)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.font = "34px Arial";
      ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 20);

      ctx.font = "22px Arial";
      ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
      ctx.textAlign = "left";
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawPlayer();
      drawFallingObjects();
      drawHUD();
      drawHitFlash();
      drawBonusFlash();

      if (!gameStarted) {
        drawStartScreen();
      }

      if (gameOver) {
        drawGameOver();
      }
    }

    function loop() {
      update();
      draw();
      animationId = requestAnimationFrame(loop);
    }

    startBtn.addEventListener("click", async () => {
      if (!gameStarted) {
        gameStarted = true;
      }

      if (!isMuted && !gameOver) {
        try {
          await music.play();
        } catch (err) {
          console.log("Music could not start yet:", err);
        }
      }
    });

    restartBtn.addEventListener("click", async () => {
      resetGameState();
      gameStarted = true;

      if (!isMuted) {
        try {
          music.currentTime = 0;
          await music.play();
        } catch (err) {
          console.log("Music restart blocked:", err);
        }
      }
    });

    muteBtn.addEventListener("click", () => {
      isMuted = !isMuted;

      if (isMuted) {
        music.pause();
      } else if (gameStarted && !gameOver) {
        music.play().catch(() => {});
      }
    });

    resetGameState();
    loop();
  </script>
</body>
</html>
