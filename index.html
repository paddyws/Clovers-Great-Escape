<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clover's Great Escape!</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      padding: 12px 12px 28px;
      overflow-y: auto;
    }

    h1 {
      margin: 6px 0 8px;
      text-align: center;
    }

    p {
      margin-top: 0;
      opacity: 0.85;
      text-align: center;
      max-width: 560px;
      padding: 0 12px;
      line-height: 1.4;
    }

    .game-wrap {
      position: relative;
      width: min(100%, 400px);
      aspect-ratio: 2 / 3;
      border: 2px solid white;
      background-image: url("road.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
      border-radius: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      background: transparent;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.45);
      z-index: 20;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-box {
      width: min(100%, 320px);
      background: rgba(23, 20, 18, 0.94);
      color: #f6f0e8;
      border: 1px solid rgba(255, 240, 220, 0.18);
      border-radius: 18px;
      padding: 18px 18px 16px;
      box-shadow:
        0 16px 40px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      text-align: center;
      backdrop-filter: blur(5px);
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .overlay-text {
      font-size: 17px;
      line-height: 1.45;
      white-space: pre-line;
      min-height: 78px;
    }

    .dialogue-cursor {
      display: inline-block;
      width: 0.6ch;
      animation: blinkCursor 0.9s steps(1) infinite;
      opacity: 0.8;
    }

    @keyframes blinkCursor {
      50% {
        opacity: 0;
      }
    }

    .overlay-continue {
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .overlay-continue.hidden {
      visibility: hidden;
    }

    .overlay-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .overlay-btn {
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      border: none;
      border-radius: 999px;
      min-width: 110px;
      background: linear-gradient(180deg, #f6e7d4, #dcc1a0);
      color: #2a1d14;
      font-weight: 600;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
    }

    .overlay-btn.secondary {
      background: linear-gradient(180deg, #d9d2ca, #b9aea4);
    }


    .difficulty-menu {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 4px 0 2px;
    }

    .difficulty-title {
      margin: 0 0 4px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff7d6;
      text-shadow: 0 0 14px rgba(255, 230, 160, 0.28);
    }

    .difficulty-subtitle {
      margin: 0 0 4px;
      font-size: 13px;
      line-height: 1.35;
      color: rgba(246, 240, 232, 0.82);
    }

    .difficulty-options {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .difficulty-card {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid rgba(255, 240, 220, 0.22);
      border-radius: 999px;
      cursor: pointer;
      background: linear-gradient(180deg, #f6e7d4, #cfae86);
      color: #2a1d14;
      text-align: center;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: 0 9px 22px rgba(0, 0, 0, 0.30);
      transform: translateY(0);
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    }

    .difficulty-card:hover,
    .difficulty-card:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 13px 28px rgba(0, 0, 0, 0.42);
      filter: brightness(1.05);
      outline: none;
    }

    .difficulty-card:active {
      transform: translateY(1px) scale(0.99);
    }

    .difficulty-card.cowgirl {
      background: linear-gradient(180deg, #e99a58, #a9442b);
      color: #fff7ed;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
    }

    .end-banner {
      position: absolute;
      inset: 0;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(30px, 8vw, 52px);
      font-weight: 800;
      letter-spacing: 0.12em;
      color: #fff7d6;
      text-shadow:
        0 0 12px rgba(255, 230, 150, 0.55),
        0 6px 20px rgba(0, 0, 0, 0.55);
      pointer-events: none;
    }

    .end-banner.hidden {
      display: none;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.5rem;
      }

      p {
        font-size: 0.95rem;
      }

      .overlay-text {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <h1>Clover's Great Escape!</h1>
  <p>
    Escape the butchers! Eat your veggies!
    <br>
  </p>

  <div class="game-wrap">
    <canvas id="game" width="400" height="600"></canvas>

    <div id="overlay" class="overlay">
      <div class="overlay-box">
        <div id="overlayText" class="overlay-text"></div>
        <div id="overlayContinue" class="overlay-continue hidden">tap to continue</div>
        <div id="overlayButtons" class="overlay-buttons"></div>
      </div>
    </div>

    <div id="endBanner" class="end-banner hidden">FREEDOM</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const overlay = document.getElementById("overlay");
    const overlayText = document.getElementById("overlayText");
    const overlayButtons = document.getElementById("overlayButtons");
    const overlayContinue = document.getElementById("overlayContinue");
    const endBanner = document.getElementById("endBanner");

    let gameStarted = false;
    let gameOver = false;
    let gamePaused = true;
    let gameWon = false;
    let frame = 0;
    let score = 0;
    let lives = 3;
    let awardedLifeThreshold = 0;
    let hitFlashTimer = 0;
    let bonusFlashTimer = 0;
    let bonusFlashText = "";
    let speedModeActivated = false;

    let checkpoint18000Shown = false;
    let checkpoint10000Shown = false;
    let checkpoint22000Shown = false;
    let freedomSequenceActive = false;
    let heartsCelebrationActive = false;
    let finalOverlayShown = false;
    let exitingMortality = false;
    let heartExplosionCount = 0;
    const MAX_HEART_EXPLOSIONS = 3;

    let cowbellModeActive = false;
    let canvasFlashPhase = 0;

    let mooPulseActive = false;
    let mooPulseTimer = 0;
    let mooCooldownTimer = 0;
    let lastTapTime = 0;
    let mooFlashTimer = 0;

    let activeDialogue = null;
    let dialogueTimeout = null;
    let overlayTapHandler = null;
    let introDialoguePlayed = false;

    let difficultyMultiplier = 1.0;
    let selectedDifficulty = "normal";

    const BASE_WIDTH = 400;
    const BASE_HEIGHT = 600;

    const player = {
      x: 180,
      y: 500,
      width: 72,
      height: 72,
      speed: 11,
      invulnerableTimer: 0
    };

    let keys = {};
    let fallingObjects = [];
    let heartBursts = [];

    let touchActive = false;
    let touchTargetX = null;
    let touchTargetY = null;

    let playerFacingLeft = false;

    const playerSpriteSheet = new Image();
    playerSpriteSheet.src = "cow2-walk-v1.png";

    const PLAYER_SPRITE_COLS = 5;
    const PLAYER_SPRITE_ROWS = 5;
    const PLAYER_TOTAL_FRAMES = 25;
    const PLAYER_FRAME_DURATION = 6;
    let playerAnimationFrame = 0;

    const badImageFiles = ["falling1.png", "falling2.png", "falling3.png"];
    const badImages = badImageFiles.map(file => {
      const img = new Image();
      img.src = file;
      return img;
    });

    const butcherSpriteSheet = new Image();
    butcherSpriteSheet.src = "butcher-walk.png";

    const BUTCHER_SPRITE_COLS = 5;
    const BUTCHER_SPRITE_ROWS = 5;
    const BUTCHER_TOTAL_FRAMES = 25;
    const BUTCHER_FRAME_DURATION = 6;

    const stalkerButcherSpriteSheet = new Image();
    stalkerButcherSpriteSheet.src = "Pitchfork Butcher-walk.png";

    const STALKER_BUTCHER_SPRITE_COLS = 5;
    const STALKER_BUTCHER_SPRITE_ROWS = 5;
    const STALKER_BUTCHER_TOTAL_FRAMES = 25;
    const STALKER_BUTCHER_FRAME_DURATION = 8;

    const stalkerButcher = {
      x: 0,
      y: 0,
      width: 0,
      height: 0,
      speed: 0,
      active: true,
      hitCooldown: 0,
      animationOffset: 0
    };


    const cowgirlIdleSpriteSheet = new Image();
    cowgirlIdleSpriteSheet.src = "Crazed Cowgirl w. pitchfork_)-idle-v1.png";

    const cowgirlAttackSpriteSheet = new Image();
    cowgirlAttackSpriteSheet.src = "Crazed Cowgirl w. pitchfork_)-attack-v1.png";

    const cowgirlJumpSpriteSheet = new Image();
    cowgirlJumpSpriteSheet.src = "Crazed Cowgirl w. pitchfork_)-jump-v1.png";

    const cowgirlRunSpriteSheet = new Image();
    cowgirlRunSpriteSheet.src = "Crazed Cowgirl w. pitchfork_)-run-v1.png";

    const cowgirlWalkSpriteSheet = new Image();
    cowgirlWalkSpriteSheet.src = "Crazed Cowgirl w. pitchfork_)-walk-v1.png";

    const COWGIRL_SPRITE_COLS = 5;
    const COWGIRL_SPRITE_ROWS = 5;
    const COWGIRL_TOTAL_FRAMES = 25;
    const COWGIRL_IDLE_FRAME_DURATION = 4;
    const COWGIRL_RUN_FRAME_DURATION = 5;
    const COWGIRL_ATTACK_FRAME_DURATION = 4;
    const COWGIRL_JUMP_FRAME_DURATION = 4;
    const COWGIRL_WALK_FRAME_DURATION = 7;

    const COWGIRL_MOVE_INTERVAL = 200;   // 10 seconds at about 60fps
    const COWGIRL_SWIPE_DURATION = 26;
    const COWGIRL_RESPAWN_TIME = 200;    // 10 seconds
    const COWGIRL_TRIGGER_SCORE = 4400;

    const cowgirl = {
      unlocked: false,
      visible: false,
      state: "hidden", // hidden, entering, idle, running, fleeing // hidden, idle, running, swiping, fleeing
      x: 0,
      y: 0,
      width: 0,
      height: 0,
      speed: 0,
      facingLeft: false,
      currentCorner: 0,
      targetCorner: 1,
      moveTimer: COWGIRL_MOVE_INTERVAL,
      swipeTimer: 0,
      respawnTimer: 0,
      damageCooldown: 0,
      fleeVX: 0,
      fleeVY: 0,
      animationOffset: 0
    };

    const bonus200Img = new Image();
    bonus200Img.src = "falling4.png";

    const bonus1000Img = new Image();
    bonus1000Img.src = "falling5.png";

    const pastureImage = new Image();
    pastureImage.src = "pasture.png";

    const MOO_COOLDOWN_FRAMES = 420; // 5 seconds at about 60fps
    const MOO_BOSS_COOLDOWN_FRAMES = 0;
    const MOO_PULSE_RADIUS = 140;

    let greenerPasturesActive = false;
    let greenerPasturesFade = 0;
    let greenerPasturesTextShown = false;

    let bossFightActive = false;
    let bossDefeatedPastureActive = false;
    let bossPoofs = [];
    let bossGrass = [];
    let bossPitchforks = [];
    let bossGrassSpawnTimer = 0;
    let bossPatternTimer = 0;
    let bossPatternPhase = "corner"; // corner, throw, fleeing
    let bossTargetCorner = 0;

    const pitchforkImage = new Image();
    pitchforkImage.src = "pitchfork.png";

    const cowgirlBoss = {
      x: 0,
      y: 0,
      width: 0,
      height: 0,
      speed: 0,
      health: 4,
      maxHealth: 4,
      state: "hidden",
      facingLeft: false,
      attackTimer: 0,
      attackCooldown: 0,
      damageCooldown: 0,
      flashTimer: 0,
      throwCooldown: 0,
      animationOffset: 0
    };

    const music = new Audio("music.mp3");
    music.loop = true;
    music.volume = 0.5;
    music.preload = "auto";

    const cowgirlMusic = new Audio("cowgirl.mp3");
    cowgirlMusic.loop = true;
    cowgirlMusic.volume = 0.55;
    cowgirlMusic.preload = "auto";

    const hitSound = new Audio("hit.mp3");
    hitSound.volume = 0.8;
    hitSound.preload = "auto";

    const bonusSound = new Audio("bonus.mp3");
    bonusSound.volume = 1.0;
    bonusSound.preload = "auto";

    const mooSound = new Audio("moo.m4a");
    mooSound.volume = 0.9;
    mooSound.preload = "auto";

    const dialogueSound = new Audio("dialoguesounds.mp3");
    dialogueSound.volume = 0.9;
    dialogueSound.preload = "auto";

    let isMuted = false;
    let soundsUnlocked = false;

    function scaleX(value) {
      return value * (canvas.width / BASE_WIDTH);
    }

    function scaleY(value) {
      return value * (canvas.height / BASE_HEIGHT);
    }

    function resizeCanvasToDisplaySize() {
      const displayWidth = Math.round(canvas.clientWidth);
      const displayHeight = Math.round(canvas.clientHeight);

      if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
        const oldWidth = canvas.width || BASE_WIDTH;
        const oldHeight = canvas.height || BASE_HEIGHT;

        const playerXRatio = player.x / oldWidth;
        const playerYRatio = player.y / oldHeight;

        canvas.width = displayWidth;
        canvas.height = displayHeight;

        player.x = playerXRatio * canvas.width;
        player.y = playerYRatio * canvas.height;
      }
    }

    function drawSpriteFrame(img, frameIndex, cols, rows, dx, dy, dWidth, dHeight) {
      if (!img.complete || img.naturalWidth === 0) return;

      const frameWidth = img.width / cols;
      const frameHeight = img.height / rows;

      const col = frameIndex % cols;
      const row = Math.floor(frameIndex / cols);

      const sx = col * frameWidth;
      const sy = row * frameHeight;

      ctx.drawImage(
        img,
        sx, sy, frameWidth, frameHeight,
        dx, dy, dWidth, dHeight
      );
    }

    function getHitbox(obj, insetPercent = 0.18) {
      const insetX = obj.width * insetPercent;
      const insetY = obj.height * insetPercent;

      return {
        x: obj.x + insetX,
        y: obj.y + insetY,
        width: obj.width - insetX * 2,
        height: obj.height - insetY * 2
      };
    }

    function getHomingStrength() {
      const base = score >= 10000 ? 0.015 : 0.010;
      const extra = score >= 10000 ? 0.015 : 0.012;
      return base + Math.min(score / 60000, extra);
    }

    function getStalkerButcherSpeed() {
      return Math.max(scaleX(0.38), 0.22) * difficultyMultiplier;
    }

    function resetStalkerButcherPosition() {
      stalkerButcher.width = scaleX(70 * 1.2);
      stalkerButcher.height = scaleY(70 * 1.2);
      stalkerButcher.speed = getStalkerButcherSpeed();
      stalkerButcher.x = scaleX(12);
      stalkerButcher.y = scaleY(16);
      stalkerButcher.active = true;
      stalkerButcher.hitCooldown = 0;
      stalkerButcher.animationOffset = Math.floor(Math.random() * 1000);
    }


    function getCowgirlCorners() {
      const padX = scaleX(18);
      const padY = scaleY(18);
      const usableWidth = canvas.width - cowgirl.width - padX;
      const usableHeight = canvas.height - cowgirl.height - padY;

      return [
        { x: padX, y: padY },
        { x: usableWidth, y: padY },
        { x: usableWidth, y: usableHeight },
        { x: padX, y: usableHeight }
      ];
    }

    function placeCowgirlAtCorner(cornerIndex) {
      const corners = getCowgirlCorners();
      const corner = corners[cornerIndex];
      cowgirl.x = corner.x;
      cowgirl.y = corner.y;
      cowgirl.currentCorner = cornerIndex;
      cowgirl.facingLeft = cornerIndex === 1 || cornerIndex === 2;
    }

    function spawnCowgirl() {
      cowgirl.unlocked = true;
      cowgirl.visible = true;
      cowgirl.width = scaleX(76 * 1.2);
      cowgirl.height = scaleY(76 * 1.2);
      cowgirl.speed = Math.max(scaleX(3.4), 2.2);
      cowgirl.moveTimer = COWGIRL_MOVE_INTERVAL;
      cowgirl.swipeTimer = 0;
      cowgirl.respawnTimer = 0;
      cowgirl.damageCooldown = 0;
      cowgirl.animationOffset = Math.floor(Math.random() * 1000);

      const entryCorner = Math.floor(Math.random() * 4);
      cowgirl.currentCorner = entryCorner;
      cowgirl.targetCorner = entryCorner;

      const corners = getCowgirlCorners();
      const target = corners[entryCorner];
      const offY = scaleY(140);

      // She now drops in from just outside the chosen corner instead of popping into place.
      cowgirl.x = target.x;
      cowgirl.y = entryCorner === 0 || entryCorner === 1
        ? -cowgirl.height - offY
        : canvas.height + offY;

      cowgirl.state = "entering";
      cowgirl.facingLeft = entryCorner === 1 || entryCorner === 2;
    }

    function awardCowgirlPointsAndFlee() {
      if (!cowgirl.visible || cowgirl.state === "fleeing") return;

      score += 400;
      maybeAwardExtraLife();
      bonusFlashTimer = 36;
      bonusFlashText = "+400";
      playSound(bonusSound);
      sendCowgirlOffscreen();
    }

    function sendCowgirlOffscreen() {
      if (!cowgirl.visible) return;

      cowgirl.state = "fleeing";
      cowgirl.swipeTimer = 0;
      cowgirl.moveTimer = 0;

      const centerX = cowgirl.x + cowgirl.width / 2;
      const centerY = cowgirl.y + cowgirl.height / 2;

      const dirX = centerX < canvas.width / 2 ? -1 : 1;
      const dirY = centerY < canvas.height / 2 ? -1 : 1;

      cowgirl.fleeVX = dirX * Math.max(scaleX(6.5), 4.2);
      cowgirl.fleeVY = dirY * Math.max(scaleY(5.8), 3.8);
      cowgirl.facingLeft = cowgirl.fleeVX < 0;
    }

    function hideCowgirlAndStartRespawn() {
      cowgirl.visible = false;
      cowgirl.state = "hidden";
      cowgirl.respawnTimer = COWGIRL_RESPAWN_TIME;
      cowgirl.swipeTimer = 0;
      cowgirl.moveTimer = 0;
      cowgirl.damageCooldown = 0;
    }

    function startCowgirlRunToNextCorner() {
      cowgirl.state = "running";
      cowgirl.targetCorner = (cowgirl.currentCorner + 1) % 4;
    }

    function settleCowgirlInCorner() {
      cowgirl.state = "idle";
      cowgirl.moveTimer = COWGIRL_MOVE_INTERVAL;
      cowgirl.facingLeft = cowgirl.currentCorner === 1 || cowgirl.currentCorner === 2;
    }

    function getCowgirlTouchHitbox() {
      return getHitbox(cowgirl, 0.18);
    }

    function isCowgirlNearPlayer() {
      if (!cowgirl.visible || cowgirl.state === "fleeing") return false;

      const cowgirlCenterX = cowgirl.x + cowgirl.width / 2;
      const cowgirlCenterY = cowgirl.y + cowgirl.height / 2;
      const playerCenterX = player.x + player.width / 2;
      const playerCenterY = player.y + player.height / 2;
      const distance = Math.hypot(playerCenterX - cowgirlCenterX, playerCenterY - cowgirlCenterY);

      return distance <= scaleX(135);
    }

    function damagePlayerFromCowgirl() {
      if (player.invulnerableTimer > 0 || cowgirl.damageCooldown > 0) return;

      lives--;
      player.invulnerableTimer = 60;
      cowgirl.damageCooldown = 45;
      hitFlashTimer = 20;
      playSound(hitSound);

      if (lives <= 0) {
        gameOver = true;
        gamePaused = true;
        music.pause();

        showOverlay(
          `You became a steak.\n\nFinal Score: ${score}`,
          [
            {
              label: "Again",
              onClick: () => {
                restartGame();
              }
            }
          ],
          {
            speed: 28,
            requireContinueBeforeButtons: true
          }
        );
      }
    }

    function updateCowgirl() {
      cowgirl.width = scaleX(76 * 1.2);
      cowgirl.height = scaleY(76 * 1.2);
      cowgirl.speed = Math.max(scaleX(3.4), 2.2);

      if (!cowgirl.unlocked && score >= COWGIRL_TRIGGER_SCORE) {
        spawnCowgirl();
      }

      if (!cowgirl.unlocked) return;

      if (!cowgirl.visible) {
        if (cowgirl.respawnTimer > 0) {
          cowgirl.respawnTimer--;
        } else {
          spawnCowgirl();
        }
        return;
      }

      if (cowgirl.damageCooldown > 0) {
        cowgirl.damageCooldown--;
      }

      if (cowgirl.state === "idle") {
        cowgirl.moveTimer--;

        if (cowgirl.moveTimer <= 0) {
          startCowgirlRunToNextCorner();
        }
      } else if (cowgirl.state === "entering" || cowgirl.state === "running") {
        const corners = getCowgirlCorners();
        const target = corners[cowgirl.targetCorner];

        const dx = target.x - cowgirl.x;
        const dy = target.y - cowgirl.y;
        const distance = Math.hypot(dx, dy) || 1;

        cowgirl.facingLeft = dx < 0 || cowgirl.currentCorner === 1 || cowgirl.currentCorner === 2;

        if (distance <= cowgirl.speed + 1) {
          cowgirl.x = target.x;
          cowgirl.y = target.y;
          cowgirl.currentCorner = cowgirl.targetCorner;
          settleCowgirlInCorner();
        } else {
          cowgirl.x += (dx / distance) * cowgirl.speed;
          cowgirl.y += (dy / distance) * cowgirl.speed;
        }
      } else if (cowgirl.state === "fleeing") {
        cowgirl.x += cowgirl.fleeVX;
        cowgirl.y += cowgirl.fleeVY;

        if (
          cowgirl.x + cowgirl.width < -scaleX(80) ||
          cowgirl.x > canvas.width + scaleX(80) ||
          cowgirl.y + cowgirl.height < -scaleY(80) ||
          cowgirl.y > canvas.height + scaleY(80)
        ) {
          hideCowgirlAndStartRespawn();
        }
      }

      if (!freedomSequenceActive && !heartsCelebrationActive && cowgirl.visible) {
        const playerHitbox = getHitbox(player, 0.12);
        const cowgirlHitbox = getCowgirlTouchHitbox();

        if (rectsIntersect(playerHitbox, cowgirlHitbox)) {
          if (cowgirl.state === "running" || cowgirl.state === "entering") {
            damagePlayerFromCowgirl();
          } else if (cowgirl.state === "idle") {
            awardCowgirlPointsAndFlee();
          }
        }
      }

    function unlockSounds() {
      if (soundsUnlocked) return;
      soundsUnlocked = true;

      const sounds = [hitSound, bonusSound, mooSound, cowgirlMusic];

      sounds.forEach((sound) => {
        try {
          sound.load();
          const playAttempt = sound.play();

          if (playAttempt && typeof playAttempt.then === "function") {
            playAttempt
              .then(() => {
                sound.pause();
                sound.currentTime = 0;
              })
              .catch(() => {});
          } else {
            sound.pause();
            sound.currentTime = 0;
          }
        } catch (err) {}
      });
    }

    function getMooPulseRadius() {
      return scaleX(MOO_PULSE_RADIUS);
    }

    function destroyHostileObjectsInMooPulse() {
      const pulseCenterX = player.x + player.width / 2;
      const pulseCenterY = player.y + player.height / 2;
      const pulseRadius = getMooPulseRadius();
      let destroyedCount = 0;

      for (let i = fallingObjects.length - 1; i >= 0; i--) {
        const obj = fallingObjects[i];
        const isHostile = obj.type === "bad" || obj.type === "butcher";
        if (!isHostile) continue;

        const objCenterX = obj.x + obj.width / 2;
        const objCenterY = obj.y + obj.height / 2;
        const distance = Math.hypot(objCenterX - pulseCenterX, objCenterY - pulseCenterY);

        if (distance <= pulseRadius + obj.width / 2) {
          fallingObjects.splice(i, 1);
          destroyedCount++;
        }
      }

      if (destroyedCount > 0) {
        const mooPoints = destroyedCount * destroyedCount * 100;
        score += mooPoints;
        maybeShowSpeedModeBanner();
        maybeAwardExtraLife();
        bonusFlashTimer = 44;
        bonusFlashText = `MOO! +${mooPoints}`;
        playSound(bonusSound);
      }
    }

    function activateMooPulse() {
      if (!gameStarted || gamePaused || gameOver) return;
      if (freedomSequenceActive || heartsCelebrationActive) return;
      if (mooCooldownTimer > 0 && !bossFightActive) return;

      unlockSounds();

      mooPulseActive = true;
      mooPulseTimer = 120;
      mooCooldownTimer = bossFightActive ? MOO_BOSS_COOLDOWN_FRAMES : MOO_COOLDOWN_FRAMES;
      mooFlashTimer = 18;
      bonusFlashTimer = 40;
      bonusFlashText = "MOO!";

      if (bossFightActive) {
        hitCowgirlBossWithMoo();
      } else {
        destroyHostileObjectsInMooPulse();
      }

      playSound(mooSound);
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function renderDialogueText(text, typedLength, done = false) {
      const visible = escapeHtml(text.slice(0, typedLength)).replace(/\n/g, "<br>");
      overlayText.innerHTML = visible + (done ? "" : `<span class="dialogue-cursor">|</span>`);
    }

    function clearDialogueHandlers() {
      if (dialogueTimeout) {
        clearTimeout(dialogueTimeout);
        dialogueTimeout = null;
      }

      if (overlayTapHandler) {
        overlay.removeEventListener("click", overlayTapHandler);
        overlayTapHandler = null;
      }

      activeDialogue = null;
    }

    function finalizeDialogue() {
      if (!activeDialogue) return;

      activeDialogue.index = activeDialogue.text.length;
      renderDialogueText(activeDialogue.text, activeDialogue.index, true);

      if (activeDialogue.requireContinueBeforeButtons && activeDialogue.buttons.length > 0) {
        overlayContinue.classList.remove("hidden");

        overlayTapHandler = (e) => {
          if (e.target.closest("button")) return;
          overlay.removeEventListener("click", overlayTapHandler);
          overlayTapHandler = null;
          overlayContinue.classList.add("hidden");
          showDialogueButtons(activeDialogue.buttons);
        };

        overlay.addEventListener("click", overlayTapHandler);
      } else {
        showDialogueButtons(activeDialogue.buttons);
      }
    }

    function typeNextCharacter() {
      if (!activeDialogue) return;

      if (activeDialogue.index >= activeDialogue.text.length) {
        finalizeDialogue();
        return;
      }

      activeDialogue.index++;
      renderDialogueText(activeDialogue.text, activeDialogue.index, false);

      const currentChar = activeDialogue.text[activeDialogue.index - 1];
      let delay = activeDialogue.speed;

      if (currentChar === "." || currentChar === "?" || currentChar === "!") {
        delay += 120;
      } else if (currentChar === ",") {
        delay += 70;
      } else if (currentChar === "\n") {
        delay += 120;
      } else if (currentChar === " ") {
        delay -= 5;
      }

      dialogueTimeout = setTimeout(typeNextCharacter, Math.max(15, delay));
    }

    function showDialogueButtons(buttons = []) {
      overlayButtons.innerHTML = "";

      buttons.forEach((btn) => {
        const button = document.createElement("button");
        button.className = `overlay-btn${btn.secondary ? " secondary" : ""}`;
        button.textContent = btn.label;
        button.addEventListener("click", btn.onClick);
        overlayButtons.appendChild(button);
      });
    }

    function showOverlay(text, buttons = [], options = {}) {
      clearDialogueHandlers();

      gamePaused = true;
      overlay.classList.remove("hidden");
      overlayButtons.innerHTML = "";
      overlayContinue.classList.add("hidden");

      const speed = options.speed ?? 28;
      const requireContinueBeforeButtons = options.requireContinueBeforeButtons ?? false;

      activeDialogue = {
        text,
        buttons,
        index: 0,
        speed,
        requireContinueBeforeButtons
      };

      renderDialogueText(text, 0, false);

      overlayTapHandler = (e) => {
        if (e.target.closest("button")) return;
        if (!activeDialogue) return;

        if (activeDialogue.index < activeDialogue.text.length) {
          finalizeDialogue();
        }
      };

      overlay.addEventListener("click", overlayTapHandler);
      typeNextCharacter();
    }

    function getBossCorners() {
      const pad = scaleX(18);
      const topPad = scaleY(54);
      const bottomPad = scaleY(18);
      return [
        { x: pad, y: topPad },
        { x: canvas.width - cowgirlBoss.width - pad, y: topPad },
        { x: canvas.width - cowgirlBoss.width - pad, y: canvas.height - cowgirlBoss.height - bottomPad },
        { x: pad, y: canvas.height - cowgirlBoss.height - bottomPad }
      ];
    }

    function pickDifferentBossCorner() {
      let next = Math.floor(Math.random() * 4);
      if (next === bossTargetCorner) next = (next + 1 + Math.floor(Math.random() * 3)) % 4;
      bossTargetCorner = next;
      bossPatternTimer = 0;
      bossPatternPhase = "corner";
      cowgirlBoss.state = "running";
    }

    function spawnBossGrass() {
      const size = scaleX(78);
      const minY = canvas.height / 2;
      const maxY = canvas.height - size;

      bossGrass.push({
        x: Math.random() * Math.max(1, canvas.width - size),
        y: minY + Math.random() * Math.max(1, maxY - minY),
        width: size,
        height: size,
        pulse: Math.floor(Math.random() * 1000)
      });
    }

    function throwBossPitchfork() {
      const bossCenterX = cowgirlBoss.x + cowgirlBoss.width / 2;
      const bossCenterY = cowgirlBoss.y + cowgirlBoss.height / 2;
      const playerCenterX = player.x + player.width / 2;
      const playerCenterY = player.y + player.height / 2;

      const dx = playerCenterX - bossCenterX;
      const dy = playerCenterY - bossCenterY;
      const distance = Math.hypot(dx, dy) || 1;
      const speed = Math.max(scaleX(7.2), 4.6) * difficultyMultiplier;

      bossPitchforks.push({
        x: bossCenterX,
        y: bossCenterY,
        vx: (dx / distance) * speed,
        vy: (dy / distance) * speed,
        width: scaleX(92),
        height: scaleY(24),

        // This angle points the pitchfork toward Clover, whether she is
        // left, right, above, below, or diagonal from the cowgirl.
        angle: Math.atan2(dy, dx),

        life: 150
      });

      bonusFlashTimer = 48;
      bonusFlashText = "Bullseye";
    }

    function getRotatedPitchforkHitbox(pitchfork) {
      // The drawn image is rotated toward Clover. This places the damage box
      // out near the front/spiky side instead of the wooden handle side.
      const contraction = 0.07;
      const tipOffset = pitchfork.width * 0.50;

      const hitboxWidth = pitchfork.width * 0.44 * (1 - contraction);
      const hitboxHeight = pitchfork.height * 1.1 * (1 - contraction);

      return {
        x: pitchfork.x + Math.cos(pitchfork.angle) * tipOffset - hitboxWidth / 2,
        y: pitchfork.y + Math.sin(pitchfork.angle) * tipOffset - hitboxHeight / 2,
        width: hitboxWidth,
        height: hitboxHeight
      };
    }

    }

    function updateBossPlayerControls() {
      let isMoving = false;
      player.width = scaleX(72 * 1.5);
      player.height = scaleY(72 * 1.5);
      player.speed = Math.max(scaleX(11), 4);

      if (keys["ArrowLeft"] || keys["a"] || keys["A"]) {
        player.x -= player.speed;
        playerFacingLeft = true;
        isMoving = true;
      }
      if (keys["ArrowRight"] || keys["d"] || keys["D"]) {
        player.x += player.speed;
        playerFacingLeft = false;
        isMoving = true;
      }
      if (keys["ArrowUp"] || keys["w"] || keys["W"]) {
        player.y -= player.speed;
        isMoving = true;
      }
      if (keys["ArrowDown"] || keys["s"] || keys["S"]) {
        player.y += player.speed;
        isMoving = true;
      }

      if (touchActive && touchTargetX !== null && touchTargetY !== null) {
        const dx = touchTargetX - player.x;
        const dy = touchTargetY - player.y;

        if (Math.abs(dx) > player.speed) {
          player.x += Math.sign(dx) * player.speed;
          playerFacingLeft = dx < 0;
          isMoving = true;
        } else if (Math.abs(dx) > 1) {
          player.x = touchTargetX;
          playerFacingLeft = dx < 0;
          isMoving = true;
        }

        if (Math.abs(dy) > player.speed) {
          player.y += Math.sign(dy) * player.speed;
          isMoving = true;
        } else if (Math.abs(dy) > 1) {
          player.y = touchTargetY;
          isMoving = true;
        }
      }

      if (player.x < 0) player.x = 0;
      if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
      const bossPlayerTopLimit = canvas.height / 2;
      if (player.y < bossPlayerTopLimit) player.y = bossPlayerTopLimit;
      if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;

      playerAnimationFrame = isMoving
        ? Math.floor(frame / PLAYER_FRAME_DURATION) % PLAYER_TOTAL_FRAMES
        : 0;
    }

    function updateBossFight() {
      frame++;
      updateBossPlayerControls();

      if (player.invulnerableTimer > 0) player.invulnerableTimer--;
      if (hitFlashTimer > 0) hitFlashTimer--;
      if (bonusFlashTimer > 0) bonusFlashTimer--;
      if (mooFlashTimer > 0) mooFlashTimer--;

      if (mooPulseTimer > 0) {
        mooPulseTimer--;
      } else {
        mooPulseActive = false;
      }

      if (mooCooldownTimer > 0) {
        mooCooldownTimer--;
      }

      if (cowgirlBoss.damageCooldown > 0) cowgirlBoss.damageCooldown--;
      if (cowgirlBoss.flashTimer > 0) cowgirlBoss.flashTimer--;
      if (cowgirlBoss.throwCooldown > 0) cowgirlBoss.throwCooldown--;

      bossGrassSpawnTimer++;
      if (bossGrassSpawnTimer >= 60) {
        bossGrassSpawnTimer = 0;
        if (bossGrass.length < 2) {
          spawnBossGrass();
        }
      }

      const playerHitbox = getHitbox(player, 0.14);
      const corners = getBossCorners();
      const target = corners[bossTargetCorner];
      const dx = target.x - cowgirlBoss.x;
      const dy = target.y - cowgirlBoss.y;
      const distance = Math.hypot(dx, dy) || 1;

      bossPatternTimer++;
      cowgirlBoss.facingLeft = dx < 0;

      if (bossPatternPhase === "corner") {
        cowgirlBoss.state = "running";
        cowgirlBoss.x += (dx / distance) * cowgirlBoss.speed;
        cowgirlBoss.y += (dy / distance) * cowgirlBoss.speed;

        if (distance <= cowgirlBoss.speed + 2) {
          cowgirlBoss.x = target.x;
          cowgirlBoss.y = target.y;
          bossPatternPhase = "throw";
          bossPatternTimer = 0;
          cowgirlBoss.throwCooldown = 20;
        }
      } else if (bossPatternPhase === "throw") {
        cowgirlBoss.state = "attacking";
        cowgirlBoss.facingLeft = (player.x + player.width / 2) < (cowgirlBoss.x + cowgirlBoss.width / 2);

        if (cowgirlBoss.throwCooldown <= 0) {
          throwBossPitchfork();
          cowgirlBoss.throwCooldown = 55;
        }

        if (bossPatternTimer >= 95) {
          pickDifferentBossCorner();
        }
      }

      if (cowgirlBoss.x < 0) cowgirlBoss.x = 0;
      if (cowgirlBoss.x + cowgirlBoss.width > canvas.width) cowgirlBoss.x = canvas.width - cowgirlBoss.width;
      if (cowgirlBoss.y < 0) cowgirlBoss.y = 0;
      if (cowgirlBoss.y + cowgirlBoss.height > canvas.height) cowgirlBoss.y = canvas.height - cowgirlBoss.height;

      const bossHitbox = getHitbox(cowgirlBoss, 0.24);
      if (rectsIntersect(playerHitbox, bossHitbox) && cowgirlBoss.damageCooldown <= 0) {
        cowgirlBoss.damageCooldown = 45;
        pickDifferentBossCorner();
      }

      for (let i = bossPitchforks.length - 1; i >= 0; i--) {
        const pitchfork = bossPitchforks[i];
        pitchfork.x += pitchfork.vx;
        pitchfork.y += pitchfork.vy;
        pitchfork.life--;

        const pitchforkHitbox = getRotatedPitchforkHitbox(pitchfork);
        if (rectsIntersect(playerHitbox, pitchforkHitbox)) {
          bossPitchforks.splice(i, 1);
          if (damagePlayerInBossFight()) return;
          continue;
        }

        if (
          pitchfork.life <= 0 ||
          pitchfork.x < -pitchfork.width ||
          pitchfork.x > canvas.width + pitchfork.width ||
          pitchfork.y < -pitchfork.width ||
          pitchfork.y > canvas.height + pitchfork.width
        ) {
          bossPitchforks.splice(i, 1);
        }
      }

      for (let i = bossGrass.length - 1; i >= 0; i--) {
        const grass = bossGrass[i];
        if (rectsIntersect(playerHitbox, getHitbox(grass, 0.08))) {
          score += 200;
          maybeAwardExtraLife();
          bonusFlashTimer = 28;
          bonusFlashText = "+200 grass";
          playSound(bonusSound);
          bossGrass.splice(i, 1);
        }
      }
    }

    function hitCowgirlBossWithMoo() {
  if (!bossFightActive || cowgirlBoss.health <= 0) return;

  // centers
  const pulseCenterX = player.x + player.width / 2;
  const pulseCenterY = player.y + player.height / 2;

  const bossCenterX = cowgirlBoss.x + cowgirlBoss.width / 2;
  const bossCenterY = cowgirlBoss.y + cowgirlBoss.height / 2;

  // distance check
  const distance = Math.hypot(
    bossCenterX - pulseCenterX,
    bossCenterY - pulseCenterY
  );

  const pulseRadius = getMooPulseRadius();

  // ❌ outside radius → do nothing
  if (distance > pulseRadius + cowgirlBoss.width / 2) {
    return;
  }

  // ✅ inside radius → hit
  cowgirlBoss.health--;
  cowgirlBoss.flashTimer = 12;

  // knockback (away from player)
  const pushDir = bossCenterX < pulseCenterX ? -1 : 1;
  cowgirlBoss.x += pushDir * scaleX(22);

  // keep her on screen
  if (cowgirlBoss.x < 0) cowgirlBoss.x = 0;
  if (cowgirlBoss.x + cowgirlBoss.width > canvas.width) {
    cowgirlBoss.x = canvas.width - cowgirlBoss.width;
  }

  // defeat check
  if (cowgirlBoss.health <= 0) {
    defeatCowgirlBoss();
  }
}

    function createBossPoof() {
      bossPoofs = [];

      const cx = cowgirlBoss.x + cowgirlBoss.width / 2;
      const cy = cowgirlBoss.y + cowgirlBoss.height / 2;

      for (let i = 0; i < 42; i++) {
        bossPoofs.push({
          x: cx,
          y: cy,
          vx: (Math.random() - 0.5) * scaleX(5.6),
          vy: (Math.random() - 0.5) * scaleY(5.6) - scaleY(0.4),
          size: Math.random() * scaleX(18) + scaleX(12),
          life: Math.random() * 48 + 48,
          maxLife: 96
        });
      }
    }

    function updateBossPoofs() {
      for (let i = bossPoofs.length - 1; i >= 0; i--) {
        const poof = bossPoofs[i];

        poof.x += poof.vx;
        poof.y += poof.vy;
        poof.vx *= 0.97;
        poof.vy *= 0.97;
        poof.size *= 1.008;
        poof.life--;

        if (poof.life <= 0) {
          bossPoofs.splice(i, 1);
        }
      }
    }

    function drawBossPoofs() {
      ctx.save();

      for (const poof of bossPoofs) {
        const alpha = Math.max(0, poof.life / poof.maxLife);

        ctx.globalAlpha = alpha * 0.85;
        ctx.fillStyle = "rgba(225, 225, 225, 0.75)";
        ctx.beginPath();
        ctx.arc(poof.x, poof.y, poof.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = alpha * 0.35;
        ctx.fillStyle = "rgba(120, 120, 120, 0.65)";
        ctx.beginPath();
        ctx.arc(poof.x - poof.size * 0.2, poof.y + poof.size * 0.15, poof.size * 0.7, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

          type = "bonus1000";
          image = bonus1000Img;
          basePoints = 1000;
          speedMultiplier = 2.2;
        } else if (roll < 0.75) {
          type = "bonus200";
          image = bonus200Img;
          basePoints = 200;
          speedMultiplier = 1.0;
        } else {
          type = "bad";
          image = badImages[Math.floor(Math.random() * badImages.length)];
        }
      } else {
        if (roll < 0.15) {
          type = "bonus1000";
          image = bonus1000Img;
          basePoints = 1000;
          speedMultiplier = 1.9;
        } else if (roll < 0.40) {
          type = "bonus200";
          image = bonus200Img;
          basePoints = 200;
          speedMultiplier = 0.9;
        } else {
          type = "bad";
          image = badImages[Math.floor(Math.random() * badImages.length)];
        }
      }

      const size =
        type === "bonus1000"
          ? scaleX(Math.random() * 20 + 35) * 1.25
          : type === "butcher"
          ? scaleX(Math.random() * 28 + 52) * 1.15
          : scaleX(Math.random() * 25 + 40) * 1.25;

      const x = Math.random() * (canvas.width - size);
      const scoreSpeedRamp = Math.min(score * 0.001, 2.2);
      const baseSpeed = scaleY(Math.random() * 2.0 + 2 + scoreSpeedRamp);
      const speed = baseSpeed * speedMultiplier * getSpeedMultiplier();

      fallingObjects.push({
        x,
        y: -size,
        width: size,
        height: size,
        speed,
        image,
        type,
        basePoints,
        usesSpriteSheet,
        spriteCols,
        spriteRows,
        totalFrames,
        frameDuration,
        canHome,
        animationOffset: Math.floor(Math.random() * 1000)
      });
    }

    function rectsIntersect(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    function updateHearts() {
      for (let i = heartBursts.length - 1; i >= 0; i--) {
        const heart = heartBursts[i];
        heart.x += heart.vx;
        heart.y += heart.vy;
        heart.vy += scaleY(0.04);
        heart.life--;

        if (heart.life <= 0) {
          heartBursts.splice(i, 1);
        }
      }

      if (heartsCelebrationActive && heartBursts.length === 0) {
        if (heartExplosionCount < MAX_HEART_EXPLOSIONS) {
          makeHeartsExplode();
          heartExplosionCount++;
        } else if (!finalOverlayShown) {
          heartsCelebrationActive = false;
          showFinalWarmOverlay();
        }
      }
    }

    function update() {
      updateHearts();

      if (bossDefeatedPastureActive) {
        updateBossPoofs();
      }

      if (greenerPasturesActive && !gamePaused) {
        updateGreenerPasturesSequence();
        return;
      }

      if (bossFightActive && !gamePaused) {
        updateBossFight();
        return;
      }

      if (!gameStarted || gameOver || gamePaused) return;

      frame++;

      if (!freedomSequenceActive && !heartsCelebrationActive) {
        score++;
      }

      if (cowbellModeActive) {
        canvasFlashPhase++;
      }

      player.width = scaleX(72 * 1.5);
      player.height = scaleY(72 * 1.5);
      player.speed = Math.max(scaleX(11), 4);

      stalkerButcher.width = scaleX(70 * 1.2);
      stalkerButcher.height = scaleY(70 * 1.2);
      stalkerButcher.speed = getStalkerButcherSpeed();

      let isMoving = false;

      if (heartsCelebrationActive) {
        playerAnimationFrame = 0;
      } else if (freedomSequenceActive) {
        player.x += scaleX(2.6);
        playerFacingLeft = false;

        if (player.x > canvas.width + player.width) {
          gamePaused = true;
          freedomSequenceActive = false;
          endBanner.classList.remove("hidden");

          showOverlay(
            `FREEDOM`,
            [
              {
                label: "Mooooo.",
                onClick: () => {
                  exitToMortality();
                }
              }
            ],
            {
              speed: 44,
              requireContinueBeforeButtons: true
            }
          );
        }
      } else {
        if (keys["ArrowLeft"] || keys["a"] || keys["A"]) {
          player.x -= player.speed;
          playerFacingLeft = true;
          isMoving = true;
        }
        if (keys["ArrowRight"] || keys["d"] || keys["D"]) {
          player.x += player.speed;
          playerFacingLeft = false;
          isMoving = true;
        }
        if (keys["ArrowUp"] || keys["w"] || keys["W"]) {
          player.y -= player.speed;
          isMoving = true;
        }
        if (keys["ArrowDown"] || keys["s"] || keys["S"]) {
          player.y += player.speed;
          isMoving = true;
        }

        if (touchActive && touchTargetX !== null && touchTargetY !== null) {
          const dx = touchTargetX - player.x;
          const dy = touchTargetY - player.y;

          if (Math.abs(dx) > player.speed) {
            player.x += Math.sign(dx) * player.speed;
            playerFacingLeft = dx < 0;
            isMoving = true;
          } else if (Math.abs(dx) > 1) {
            player.x = touchTargetX;
            playerFacingLeft = dx < 0;
            isMoving = true;
          }

          if (Math.abs(dy) > player.speed) {
            player.y += Math.sign(dy) * player.speed;
            isMoving = true;
          } else if (Math.abs(dy) > 1) {
            player.y = touchTargetY;
            isMoving = true;
          }
        }
      }

      if (isMoving || freedomSequenceActive) {
        playerAnimationFrame = Math.floor(frame / PLAYER_FRAME_DURATION) % PLAYER_TOTAL_FRAMES;
      } else {
        playerAnimationFrame = 0;
      }

      if (player.x < 0) player.x = 0;
      if (!freedomSequenceActive && player.x + player.width > canvas.width) {
        player.x = canvas.width - player.width;
      }
      if (player.y < 0) player.y = 0;
      if (player.y + player.height > canvas.height) {
        player.y = canvas.height - player.height;
      }

      if (stalkerButcher.active && !freedomSequenceActive && !heartsCelebrationActive) {
        const stalkerCenterX = stalkerButcher.x + stalkerButcher.width / 2;
        const stalkerCenterY = stalkerButcher.y + stalkerButcher.height / 2;
        const playerCenterX = player.x + player.width / 2;
        const playerCenterY = player.y + player.height / 2;
        const dx = playerCenterX - stalkerCenterX;
        const dy = playerCenterY - stalkerCenterY;
        const distance = Math.hypot(dx, dy) || 1;

        if (mooPulseActive) {
          stalkerButcher.x -= (dx / distance) * scaleX(0.9);
          stalkerButcher.y -= (dy / distance) * scaleY(0.9);
        } else {
          stalkerButcher.x += (dx / distance) * stalkerButcher.speed;
          stalkerButcher.y += (dy / distance) * stalkerButcher.speed;
        }

        if (stalkerButcher.x < 0) stalkerButcher.x = 0;
        if (stalkerButcher.x + stalkerButcher.width > canvas.width) {
          stalkerButcher.x = canvas.width - stalkerButcher.width;
        }
        if (stalkerButcher.y < 0) stalkerButcher.y = 0;
        if (stalkerButcher.y + stalkerButcher.height > canvas.height) {
          stalkerButcher.y = canvas.height - stalkerButcher.height;
        }
      }

      if (stalkerButcher.hitCooldown > 0) {
        stalkerButcher.hitCooldown--;
      }

      updateCowgirl();

      if (player.invulnerableTimer > 0) {
        player.invulnerableTimer--;
      }

      if (hitFlashTimer > 0) hitFlashTimer--;
      if (bonusFlashTimer > 0) bonusFlashTimer--;
      if (mooFlashTimer > 0) mooFlashTimer--;

      if (mooPulseTimer > 0) {
        mooPulseTimer--;
      } else {
        mooPulseActive = false;
      }

      if (mooCooldownTimer > 0) {
        mooCooldownTimer--;
      }

      if (!freedomSequenceActive && !heartsCelebrationActive) {
        let spawnInterval = Math.max(16, 30 - Math.floor(score / 1800));

        if (cowbellModeActive) {
          spawnInterval = Math.max(4, Math.floor(spawnInterval / 3));
        }

        if (frame % spawnInterval === 0) {
          spawnObject();
        }
      }

      if (!freedomSequenceActive && stalkerButcher.active && stalkerButcher.hitCooldown <= 0 && player.invulnerableTimer <= 0) {
        const playerHitbox = getHitbox(player, 0.12);
        const stalkerHitbox = getHitbox(stalkerButcher, 0.28);

        if (rectsIntersect(playerHitbox, stalkerHitbox)) {
          lives -= 2;
          player.invulnerableTimer = 90;
          stalkerButcher.hitCooldown = 150;
          hitFlashTimer = 28;
          playSound(hitSound);
          resetStalkerButcherPosition();
          stalkerButcher.hitCooldown = 150;

          if (lives <= 0) {
            gameOver = true;
            gamePaused = true;
            music.pause();

            showOverlay(
              `You became a steak.

Final Score: ${score}`,
              [
                {
                  label: "Again",
                  onClick: () => {
                    restartGame();
                  }
                }
              ],
              {
                speed: 28,
                requireContinueBeforeButtons: true
              }
            );
          }
        }
      }

      for (let i = fallingObjects.length - 1; i >= 0; i--) {
        const obj = fallingObjects[i];
        obj.y += obj.speed;

        if (obj.canHome && !freedomSequenceActive && !heartsCelebrationActive) {
          const playerCenterX = player.x + player.width / 2;
          const playerCenterY = player.y + player.height / 2;
          const objCenterX = obj.x + obj.width / 2;
          const objCenterY = obj.y + obj.height / 2;

          const dx = playerCenterX - objCenterX;
          const dy = playerCenterY - objCenterY;

          const homingMultiplier = score >= 10000 ? 1.18 : 1.08;
          const homing = dx * getHomingStrength() * homingMultiplier;
          const maxSideSpeed = scaleX(score >= 10000 ? 1.5 : 1.35);

          obj.x += Math.max(-maxSideSpeed, Math.min(maxSideSpeed, homing));
        }

        if (obj.x < -obj.width * 0.25) obj.x = -obj.width * 0.25;
        if (obj.x + obj.width > canvas.width + obj.width * 0.25) {
          obj.x = canvas.width - obj.width * 0.75;
        }

        const playerHitbox = getHitbox(player, 0.12);
        const objectHitbox =
          obj.type === "butcher"
            ? getHitbox(obj, 0.38)
            : obj.type === "bad"
            ? getHitbox(obj, 0.31)
            : getHitbox(obj, 0.25);

        const hit = rectsIntersect(playerHitbox, objectHitbox);

        if (hit) {
          if (obj.type === "bonus200" || obj.type === "bonus1000") {
            const pointsEarned = obj.basePoints * getBonusMultiplier();
            score += pointsEarned;
            maybeShowSpeedModeBanner();
            maybeAwardExtraLife();

            bonusFlashTimer = 30;
            bonusFlashText = `+${pointsEarned}`;
            playSound(bonusSound);

            fallingObjects.splice(i, 1);
            continue;
          }

          if (!freedomSequenceActive && (obj.type === "bad" || obj.type === "butcher") && player.invulnerableTimer <= 0) {
            lives--;
            player.invulnerableTimer = 90;
            hitFlashTimer = 20;
            fallingObjects.splice(i, 1);

            playSound(hitSound);

            if (lives <= 0) {
              gameOver = true;
              gamePaused = true;
              music.pause();

              showOverlay(
                `You became a steak.\n\nFinal Score: ${score}`,
                [
                  {
                    label: "Again",
                    onClick: () => {
                      restartGame();
                    }
                  }
                ],
                {
                  speed: 28,
                  requireContinueBeforeButtons: true
                }
              );
            }

            continue;
          }
        }

        if (obj.y > canvas.height + scaleY(100)) {
          fallingObjects.splice(i, 1);
        }
      }

      if (!freedomSequenceActive && !heartsCelebrationActive) {
        maybeShowSpeedModeBanner();
        maybeAwardExtraLife();

        if (score >= 18000) {
          showCheckpoint18000();
        }

        if (score >= 10000) {
          showCheckpoint10000();
        }

        if (score >= 22000) {
          showCheckpoint22000();
        }
      }
    }

    function drawPlayer() {
      const blinking =
        player.invulnerableTimer > 0 &&
        Math.floor(player.invulnerableTimer / 5) % 2 === 0;

      if (blinking && !heartsCelebrationActive) return;

      if (playerSpriteSheet.complete && playerSpriteSheet.naturalWidth > 0) {
        ctx.save();

        if (playerFacingLeft) {
          ctx.translate(player.x + player.width, player.y);
          ctx.scale(-1, 1);

          drawSpriteFrame(
            playerSpriteSheet,
            playerAnimationFrame,
            PLAYER_SPRITE_COLS,
            PLAYER_SPRITE_ROWS,
            0,
            0,
            player.width,
            player.height
          );
        } else {
          drawSpriteFrame(
            playerSpriteSheet,
            playerAnimationFrame,
            PLAYER_SPRITE_COLS,
            PLAYER_SPRITE_ROWS,
            player.x,
            player.y,
            player.width,
            player.height
          );
        }

        ctx.restore();
      } else {
        ctx.fillStyle = "#4da6ff";
        ctx.fillRect(player.x, player.y, player.width, player.height);
      }
    }

    function drawMooFlash() {
      if (mooFlashTimer > 0) {
        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.10)";
        ctx.beginPath();
        ctx.arc(
          player.x + player.width / 2,
          player.y + player.height / 2,
          getMooPulseRadius() * (1 - mooFlashTimer / 36),
          0,
          Math.PI * 2
        );
        ctx.fill();
        ctx.restore();
      }
    }

    function drawStalkerButcher() {
      if (!stalkerButcher.active) return;

      if (stalkerButcherSpriteSheet.complete && stalkerButcherSpriteSheet.naturalWidth > 0) {
        const animFrame =
          Math.floor((frame + stalkerButcher.animationOffset) / STALKER_BUTCHER_FRAME_DURATION) % STALKER_BUTCHER_TOTAL_FRAMES;

        drawSpriteFrame(
          stalkerButcherSpriteSheet,
          animFrame,
          STALKER_BUTCHER_SPRITE_COLS,
          STALKER_BUTCHER_SPRITE_ROWS,
          stalkerButcher.x,
          stalkerButcher.y,
          stalkerButcher.width,
          stalkerButcher.height
        );
      } else {
        ctx.fillStyle = "#aa3333";
        ctx.fillRect(stalkerButcher.x, stalkerButcher.y, stalkerButcher.width, stalkerButcher.height);
      }
    }



    function drawCowgirl() {
      if (!cowgirl.visible) return;

      let sprite = cowgirlWalkSpriteSheet;
      let animFrame = 0;

      if (cowgirl.state === "running" || cowgirl.state === "entering") {
        sprite = cowgirlRunSpriteSheet;
        animFrame = Math.floor((frame + cowgirl.animationOffset) / COWGIRL_RUN_FRAME_DURATION) % COWGIRL_TOTAL_FRAMES;
      } else if (cowgirl.state === "fleeing") {
        sprite = cowgirlJumpSpriteSheet;
        animFrame = Math.floor((frame + cowgirl.animationOffset) / COWGIRL_JUMP_FRAME_DURATION) % COWGIRL_TOTAL_FRAMES;
      } else if (cowgirl.state === "idle") {
        // Stand completely still in the corner; do not use the idle animation sprite.
        sprite = cowgirlWalkSpriteSheet;
        animFrame = 0;
      }

      if (sprite.complete && sprite.naturalWidth > 0) {
        ctx.save();

        if (cowgirl.facingLeft) {
          ctx.translate(cowgirl.x + cowgirl.width, cowgirl.y);
          ctx.scale(-1, 1);

          drawSpriteFrame(
            sprite,
            animFrame,
            COWGIRL_SPRITE_COLS,
            COWGIRL_SPRITE_ROWS,
            0,
            0,
            cowgirl.width,
            cowgirl.height
          );
        } else {
          drawSpriteFrame(
            sprite,
            animFrame,
            COWGIRL_SPRITE_COLS,
            COWGIRL_SPRITE_ROWS,
            cowgirl.x,
            cowgirl.y,
            cowgirl.width,
            cowgirl.height
          );
        }

        ctx.restore();
      } else {
        ctx.fillStyle = "#d67b7b";
        ctx.fillRect(cowgirl.x, cowgirl.y, cowgirl.width, cowgirl.height);
      }
    }

    function drawFallingObjects() {
      for (const obj of fallingObjects) {
        if (obj.usesSpriteSheet && obj.image.complete && obj.image.naturalWidth > 0) {
          const animFrame =
            Math.floor((frame + obj.animationOffset) / obj.frameDuration) % obj.totalFrames;

          drawSpriteFrame(
            obj.image,
            animFrame,
            obj.spriteCols,
            obj.spriteRows,
            obj.x,
            obj.y,
            obj.width,
            obj.height
          );
        } else if (obj.image && obj.image.complete && obj.image.naturalWidth > 0) {
          ctx.drawImage(obj.image, obj.x, obj.y, obj.width, obj.height);
        } else {
          if (obj.type === "bonus200") ctx.fillStyle = "#66ff99";
          else if (obj.type === "bonus1000") ctx.fillStyle = "#ffd700";
          else ctx.fillStyle = "#ff4d4d";

          ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
        }
      }
    }

    function drawHearts() {
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      for (const heart of heartBursts) {
        ctx.font = `${Math.max(heart.size, 12)}px Arial`;
        ctx.fillText("💖", heart.x, heart.y);
      }

      ctx.restore();
    }

    function drawHUD() {
      ctx.fillStyle = "white";
      ctx.font = `${Math.max(scaleY(20), 14)}px Arial`;
      ctx.fillText(`Score: ${score}`, scaleX(12), scaleY(30));
      ctx.fillText(`Lives: ${lives}`, scaleX(12), scaleY(58));
      ctx.font = `${Math.max(scaleY(13), 10)}px Arial`;
      ctx.fillText(`Mode: ${selectedDifficulty.toUpperCase()}`, scaleX(12), scaleY(78));

      const nextLifeAt = (Math.floor(score / 2000) + 1) * 2000;
      const remaining = nextLifeAt - score;
      ctx.font = `${Math.max(scaleY(16), 12)}px Arial`;
      ctx.fillText(`Next life in: ${remaining > 0 ? remaining : 0}`, scaleX(12), scaleY(100));

      const mooReady = mooCooldownTimer <= 0;
      const mooSeconds = (mooCooldownTimer / 60).toFixed(1);

      ctx.fillStyle = mooReady ? "#9cffb0" : "#ffffff";
      ctx.font = `${Math.max(scaleY(15), 11)}px Arial`;
      ctx.fillText(
        mooReady ? "Moo ready: SPACE / double tap" : `Moo cooldown: ${mooSeconds}s`,
        scaleX(12),
        scaleY(126)
      );
    }

    function drawHitFlash() {
      if (hitFlashTimer > 0) {
        ctx.fillStyle = "rgba(255, 0, 0, 0.18)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function drawBonusFlash() {
      if (bonusFlashTimer > 0 && bonusFlashText) {
        ctx.fillStyle = "white";
        ctx.font = `${Math.max(scaleY(28), 18)}px Arial`;
        ctx.textAlign = "center";
        ctx.fillText(bonusFlashText, canvas.width / 2, scaleY(140));
        ctx.textAlign = "left";
      }
    }

    function drawCowbellFlash() {
      if (!cowbellModeActive) return;

      const alpha = 0.08 + ((Math.sin(canvasFlashPhase * 0.35) + 1) / 2) * 0.18;

      ctx.save();
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    function drawPastureBackground() {
      if (pastureImage.complete && pastureImage.naturalWidth > 0) {
        ctx.drawImage(pastureImage, 0, 0, canvas.width, canvas.height);
      } else {
        const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
        sky.addColorStop(0, "#54b6ff");
        sky.addColorStop(0.55, "#a7dcff");
        sky.addColorStop(0.56, "#62a932");
        sky.addColorStop(1, "#2e751f");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function drawGreenerPasturesSequence() {
      ctx.save();
      ctx.globalAlpha = greenerPasturesFade;
      drawPastureBackground();
      ctx.restore();

      if (greenerPasturesFade < 1) {
        ctx.save();
        ctx.globalAlpha = 1 - greenerPasturesFade;
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      drawPlayer();
    }

    function drawBossGrass() {
      for (const grass of bossGrass) {
        const pulse = 1 + Math.sin((frame + grass.pulse) * 0.08) * 0.05;
        const w = grass.width * pulse;
        const h = grass.height * pulse;
        const x = grass.x + (grass.width - w) / 2;
        const y = grass.y + (grass.height - h) / 2;

        if (bonus200Img.complete && bonus200Img.naturalWidth > 0) {
          ctx.drawImage(bonus200Img, x, y, w, h);
        } else {
          ctx.fillStyle = "#61d957";
          ctx.fillRect(x, y, w, h);
        }
      }
    }

    function drawCowgirlBoss() {
      let sprite = cowgirlRunSpriteSheet;
      let frameDuration = COWGIRL_RUN_FRAME_DURATION;

      if (cowgirlBoss.state === "attacking") {
        sprite = cowgirlAttackSpriteSheet;
        frameDuration = COWGIRL_ATTACK_FRAME_DURATION;
      } else if (cowgirlBoss.state === "jumping") {
        sprite = cowgirlJumpSpriteSheet;
        frameDuration = COWGIRL_JUMP_FRAME_DURATION;
      }

      const animFrame = Math.floor((frame + cowgirlBoss.animationOffset) / frameDuration) % COWGIRL_TOTAL_FRAMES;

      if (sprite.complete && sprite.naturalWidth > 0) {
        ctx.save();
        if (cowgirlBoss.flashTimer > 0) {
          ctx.filter = cowgirlBoss.flashTimer % 4 < 2 ? "brightness(3) saturate(0)" : "brightness(1.8)";
        }

        if (cowgirlBoss.facingLeft) {
          ctx.translate(cowgirlBoss.x + cowgirlBoss.width, cowgirlBoss.y);
          ctx.scale(-1, 1);
          drawSpriteFrame(sprite, animFrame, COWGIRL_SPRITE_COLS, COWGIRL_SPRITE_ROWS, 0, 0, cowgirlBoss.width, cowgirlBoss.height);
        } else {
          drawSpriteFrame(sprite, animFrame, COWGIRL_SPRITE_COLS, COWGIRL_SPRITE_ROWS, cowgirlBoss.x, cowgirlBoss.y, cowgirlBoss.width, cowgirlBoss.height);
        }

        ctx.restore();
      } else {
        ctx.fillStyle = cowgirlBoss.flashTimer > 0 ? "#ffffff" : "#b74747";
        ctx.fillRect(cowgirlBoss.x, cowgirlBoss.y, cowgirlBoss.width, cowgirlBoss.height);
      }
    }


    function drawBossPitchforks() {
      for (const pitchfork of bossPitchforks) {
        ctx.save();
        ctx.translate(pitchfork.x, pitchfork.y);

        // Assumes pitchfork.png has the spikes pointing to the right.
        // Math.atan2 above rotates that right-facing spike side toward Clover.
        ctx.rotate(pitchfork.angle + Math.PI/4);;

        if (pitchforkImage.complete && pitchforkImage.naturalWidth > 0) {
          ctx.drawImage(
            pitchforkImage,
            -pitchfork.width / 2,
            -pitchfork.height / 2,
            pitchfork.width,
            pitchfork.height
          );
        } else {
          ctx.fillStyle = "#9a6a3a";
          ctx.fillRect(-pitchfork.width / 2, -pitchfork.height * 0.18, pitchfork.width, pitchfork.height * 0.36);
          ctx.fillStyle = "#bfc3c7";
          ctx.fillRect(pitchfork.width * 0.15, -pitchfork.height / 2, pitchfork.width * 0.35, pitchfork.height);
        }

        ctx.restore();
      }
    }

    function drawBossHUD() {
      const barWidth = scaleX(250);
      const barHeight = scaleY(16);
      const x = canvas.width / 2 - barWidth / 2;
      const y = scaleY(18);

      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
      ctx.fillRect(x - scaleX(4), y - scaleY(4), barWidth + scaleX(8), barHeight + scaleY(8));

      ctx.fillStyle = "#3b1010";
      ctx.fillRect(x, y, barWidth, barHeight);

      ctx.fillStyle = "#ff4d4d";
      ctx.fillRect(x, y, barWidth * Math.max(0, cowgirlBoss.health / cowgirlBoss.maxHealth), barHeight);

      ctx.strokeStyle = "white";
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, barWidth, barHeight);

      ctx.fillStyle = "white";
      ctx.font = `${Math.max(scaleY(14), 11)}px Arial`;
      ctx.textAlign = "center";
      ctx.fillText(`Cowgirl Moos Left: ${Math.max(0, cowgirlBoss.health)}`, canvas.width / 2, y + scaleY(34));
      ctx.font = `${Math.max(scaleY(11), 9)}px Arial`;
      ctx.fillText("CLOVER MOO MOO CLOVER MOO YOUR LITTLE HEART OUT", canvas.width / 2, y + scaleY(50));
      ctx.restore();
    }

    function drawBossFight() {
      drawPastureBackground();
      drawBossGrass();
      drawPlayer();
      drawCowgirlBoss();
      drawBossPitchforks();
      drawMooFlash();
      drawHUD();
      drawBossHUD();
      drawHitFlash();
      drawBonusFlash();
    }

    function drawBossDefeatedPasture() {
      drawPastureBackground();
      drawPlayer();
      drawBossPoofs();
      drawMooFlash();
      drawHearts();
      drawHUD();
      drawHitFlash();
      drawBonusFlash();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (greenerPasturesActive) {
        drawGreenerPasturesSequence();
        return;
      }

      if (bossFightActive) {
        drawBossFight();
        return;
      }

      if (bossDefeatedPastureActive) {
        drawBossDefeatedPasture();
        return;
      }

      drawPlayer();
      drawStalkerButcher();
      drawCowgirl();
      drawMooFlash();
      drawFallingObjects();
      drawHearts();
      drawHUD();
      drawHitFlash();
      drawBonusFlash();
      drawCowbellFlash();
    }

    function loop() {
      resizeCanvasToDisplaySize();
      update();
      draw();
      requestAnimationFrame(loop);
    }

    resetGameState();
    showStartOverlay();
    loop();
  </script>
</body>
</html>
